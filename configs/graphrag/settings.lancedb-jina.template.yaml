### qmd_graphrag GraphRAG reference template
### Vector store: LanceDB
### Embedding provider: Jina via LiteLLM
###
### Managed graph_vault/settings.yaml is generated from .qmd/index.yml by
### src/graphrag/settings-projection.ts. This file documents the current
### projection shape and must not be edited into graph_vault by hand.

completion_models:
  default_chat_model:
    type: openai_responses
    model_provider: openai
    model: <COMPLETION_MODEL>
    api_key: ${OPENAI_API_KEY}
    api_base: ${OPENAI_BASE_URL}
    retry:
      type: exponential_backoff
      max_retries: 6
      base_delay: 2.0
      max_delay: 30.0
      jitter: true
    call_args:
      responses_endpoint: /responses
      responses_stream: true
      strict_structured_output: true
      reasoning_effort: medium
      max_completion_tokens: 23000
      qmd_responses_max_concurrency: 10

concurrent_requests: 10

embedding_models:
  default_embedding_model:
    type: litellm
    model_provider: jina_ai
    model: jina-embeddings-v5-text-small
    api_key: ${JINA_API_KEY}
    api_base: https://api.jina.ai/v1
    call_args:
      default_base_url: https://api.jina.ai
      embedding_endpoint: /v1/embeddings
      task: retrieval.passage
      dimensions: 1024
      normalized: true
      embedding_type: float
      truncate: true
  query_embedding_model:
    type: litellm
    model_provider: jina_ai
    model: jina-embeddings-v5-text-small
    api_key: ${JINA_API_KEY}
    api_base: https://api.jina.ai/v1
    call_args:
      default_base_url: https://api.jina.ai
      embedding_endpoint: /v1/embeddings
      task: retrieval.query
      dimensions: 1024
      normalized: true
      embedding_type: float
      truncate: true

input:
  type: text

input_storage:
  type: file
  base_dir: "./input"

output_storage:
  type: file
  base_dir: "./output"

reporting:
  type: file
  base_dir: "./reports"

cache:
  type: json
  storage:
    type: file
    base_dir: "./cache"

vector_store:
  type: lancedb
  db_uri: "./output/lancedb"
  vector_size: 1024

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_chat_model
  prompt: "prompts/extract_graph.txt"

summarize_descriptions:
  completion_model_id: default_chat_model
  prompt: "prompts/summarize_descriptions.txt"

community_reports:
  completion_model_id: default_chat_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"

local_search:
  completion_model_id: default_chat_model
  embedding_model_id: query_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_chat_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_chat_model
  embedding_model_id: query_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_chat_model
  embedding_model_id: query_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
