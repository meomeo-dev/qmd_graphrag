name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Node ${{ matrix.node-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ["22", "23"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - run: npm install

      - name: Install Python bridge dependencies
        run: python3 -m pip install -r python/requirements-test.txt

      - name: Typecheck
        run: node ./node_modules/typescript/bin/tsc -p tsconfig.build.json --noEmit

      - name: Build
        run: node scripts/build.mjs

      - name: Tests
        run: npx vitest run --reporter=verbose --testTimeout 60000 test/
        env:
          CI: true

      - name: Python bridge scope tests
        run: python3 test/python/test_graphrag_bridge_scope.py
        env:
          PYTHONPATH: python:vendor/graphrag/packages/graphrag-llm

      - name: Python Responses API adapter tests
        run: python3 test/python/test_graphrag_responses_completion.py
        env:
          PYTHONPATH: python:vendor/graphrag/packages/graphrag-llm

      - name: Package smoke
        run: node scripts/package-smoke.mjs

      - name: Diff check
        run: git diff --check

      - name: GraphRAG vendor subtree unchanged
        run: git diff --exit-code -- vendor/graphrag

  test-bun:
    name: Bun (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Verify lockfile is up-to-date
        run: bun install --frozen-lockfile

      - name: Tests
        run: bun test --timeout 60000 --preload ./src/test-preload.ts test/
        env:
          CI: true
          DYLD_LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

      - name: GraphRAG vendor subtree unchanged
        run: git diff --exit-code -- vendor/graphrag
