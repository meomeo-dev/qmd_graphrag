date: 2026-05-20
title: GraphRAG 子模块接入与 Responses API 决策
status: accepted
scope: qmd_graphrag

context:
  objective:
    - 以 `qmd` 为基础仓库，建立 `qmd_graphrag`。
    - 先对一批 EPUB 中的一本做 GraphRAG 冒烟，持久化路径固定到
      `graph_vault/`。
    - 向量库存储优先使用 `LanceDB`。
    - 向量服务优先使用 `Jina`。
    - 查询提示词优化依赖 `DSPy`，但不进入在线热路径。
  constraints:
    - 跨运行时数据必须受 schema / model 约束，遵循 Type DD。
    - 避免自由拼接 prompt、context、response 跨边界流动。
    - 二开边界必须支持持续维护，并能合并 GraphRAG 上游更新。
  environment:
    qmd_repo: <repo-root>
    smoke_input_dir: <repo-root>/inbox/<sample-epub-batch>
    graph_vault_dir: <repo-root>/graph_vault
    selected_epub: >-
      <repo-root>/inbox/<sample-epub-batch>/<sample-epub>

validated_facts:
  - id: qmd_has_no_native_graphrag
    fact: >-
      `qmd` 本身不包含 GraphRAG 的图抽取、community reports、
      local/global/drift 查询引擎。
  - id: lancedb_supported
    fact: GraphRAG 当前原生支持 `LanceDB`。
  - id: jina_embedding_supported
    fact: >-
      `Jina` 可经由 `GraphRAG -> graphrag-llm -> LiteLLM` 作为
      embedding provider 使用。
  - id: current_graphrag_completion_path
    fact: >-
      `graphrag-llm` 的 `LiteLLMCompletion` 实现调用
      `litellm.completion(...)` 与 `litellm.acompletion(...)`，属于
      `chat completions` 路径，不是 `OpenAI Responses API`。
    evidence:
      file: vendor/graphrag/packages/graphrag-llm/graphrag_llm/completion/lite_llm_completion.py
  - id: gateway_responses_available_on_root_path
    fact: >-
      本地网关 `POST /responses` 可用，不要求 `POST /v1/responses`。
  - id: qmd_custom_responses_provider_available
    fact: >-
      本仓库已新增独立 `openai_responses` completion provider，并通过
      bridge 注册到 GraphRAG runtime，不修改上游 `LiteLLMCompletion`。
    evidence:
      file: python/qmd_graphrag/graphrag_responses_completion.py
  - id: gateway_concurrency_sensitive
    fact: >-
      网关对 GraphRAG 社区报告阶段的默认并发较敏感，默认
      `concurrent_requests=25` 会触发 `429 Concurrency limit exceeded for user`。
  - id: smoke_failure_not_due_to_responses_only
    fact: >-
      本轮索引失败的主要剩余问题不是 completion provider 不可用，而是
      community report 阶段会受 `429` / `502` 等网关波动影响。
    evidence:
      file: graph_vault/reports/indexing-engine.log

decision:
  summary: >-
    将 `GraphRAG` 作为 `qmd_graphrag` 仓内受控依赖接入，并以仓内二开版本
    作为唯一维护入口；completion 层不改写上游 `LiteLLMCompletion`，
    而是在我们自有 Python 侧新增独立 `OpenAI Responses API` provider，
    并通过配置切换到该 provider。
  details:
    - 不把平级外部仓库视为运行时依赖。
    - 主仓库通过 typed bridge 调用仓内子模块暴露的 GraphRAG 能力。
    - GraphRAG 的上游更新通过子模块 fast-forward 或显式升级提交合并。
    - 我们的二开改动尽量收敛在最小 patch 面，避免无边界 fork 漂移。
    - 不修改上游 `LiteLLMCompletion` 的行为，减少上游同步冲突。

reasons:
  - 外部平级仓库不可追踪，不利于团队复现、CI 和交付。
  - 用户明确要求以我们自己的二开 GraphRAG 持续维护。
  - `Responses API` 已验证可通，且 base URL 不应强制追加 `/v1`。
  - 子模块模式可把上游同步与本地 patch 分层管理，维护成本最低。

implications:
  positive:
    - GraphRAG 依赖版本、补丁与运行入口可以固定在本仓库。
    - `Responses API` 适配位于自有 Python provider，而不污染 `qmd`
      核心检索逻辑。
    - Type DD 的桥接契约继续保持不变，调用侧不依赖底层实现细节。
  negative:
    - 需要管理子模块更新流程与仓内环境初始化。
    - 自有 provider 必须随上游 GraphRAG 更新做兼容性验证。
