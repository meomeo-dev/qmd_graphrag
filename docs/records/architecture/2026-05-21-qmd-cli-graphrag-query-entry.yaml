date: 2026-05-21
title: qmd CLI GraphRAG 查询入口决策
status: accepted
scope: qmd_graphrag

problem:
  summary: >-
    `qmd query` 原有语义是本地 QMD 混合检索，默认索引未包含
    `graph_vault` 时无法调用已完成的 GraphRAG 图查询能力。GraphRAG
    runtime 和 bridge 已能通过 OpenAI Responses API 与 Jina 工作，但缺少
    面向用户的 qmd CLI 入口。

decision:
  entrypoint:
    command: qmd query --graphrag <query>
    default_graph_vault: ./graph_vault
    default_method: local
    default_response_type: multiple paragraphs
  behavior:
    - 普通 `qmd query <query>` 保持本地混合检索语义不变。
    - 显式 `--graphrag` 时，CLI 构造 `GraphRagQueryRequest` 并调用
      `createQmdGraphRagRuntime().graphQuery`。
    - 默认输出只打印 `responseText`，`--json` 输出完整 typed response。
    - completion、embedding 和 rerank provider 继续由 `graph_vault/settings.yaml`
      与既有 adapter 决定；CLI 不直接理解 completion 层。

invariants:
  - 不修改 vendor GraphRAG。
  - 不读取或输出 `.env` 密钥。
  - `GraphRagQueryRequest` 和 `GraphRagQueryResponse` 必须经过既有 zod
    contract 与 Python bridge 校验。
  - CLI 只负责入口路由，不拼接 prompt、context 或 provider-specific payload。

validation:
  commands:
    - command: node ./node_modules/typescript/bin/tsc -p tsconfig.build.json --noEmit
      status: pass
    - command: >-
        CI=true node ./node_modules/vitest/vitest.mjs run --reporter=verbose
        --testTimeout 60000 test/cli.test.ts -t "CLI Help"
      status: pass
    - command: >-
        node --import tsx src/cli/qmd.ts query --graphrag --query-method local
        --python-bin ./.venv-graphrag/bin/python
        "According to A Philosophy of Software Design, what are the two causes
        of software complexity?"
      status: pass
      result: >-
        GraphRAG local query returned an answer identifying dependencies and
        obscurity, with GraphRAG data citations.
