date: 2026-05-21
title: 稳定书籍身份与 Artifact 可达性校验决策
status: accepted
scope: qmd_graphrag

problem:
  summary: >-
    书级状态层最初把源文件内容哈希纳入 `bookId`，导致同一路径的书籍内容
    变化时会产生新的状态目录。这违反了 `book_id` 作为稳定身份、
    `source_hash` 作为失效维度的边界。同时，恢复计划只检查 checkpoint
    状态与 fingerprint，未验证 checkpoint 引用的 artifact 是否仍可访问。
  risks:
    - 同一本书内容更新后被误识别为新书，历史 checkpoint 与 run trace 分裂。
    - artifact 被删除或移动后，stage 仍可能显示为 `succeeded`。
    - bootstrap 同步可能重复写入相同 artifact，扩大 manifest 噪音。

decision:
  summary: >-
    `bookId` 改为由规范化源路径派生；`sourceHash` 保留为 stage fingerprint
    的失效输入。恢复计划必须同时满足 checkpoint 状态、input fingerprint、
    artifact manifest 记录和 artifact 路径可达性。
  identity_rules:
    book_id:
      source: canonical_source_path
      purpose: 稳定书籍身份
    source_hash:
      source: source_file_content
      purpose: stage invalidation dimension
    artifact_id:
      source:
        - book_id
        - stage
        - kind
        - relative_path
        - content_hash
      excluded:
        - producer_run_id
  resume_rules:
    - succeeded checkpoint 缺失必需 artifact 时视为不可满足。
    - checkpoint 引用的 artifactId 在 manifest 中不存在时视为不可满足。
    - manifest 中 artifact 路径不可访问时视为不可满足。
    - `query_ready` 必须同时绑定 community report 与 LanceDB index。

legacy_migration:
  rule: >-
    若检测到旧版内容哈希尾缀的 book directory，且稳定路径派生的目录尚未
    存在，则迁移旧目录并重写其中的 `bookId` 引用。
  purpose: >-
    保留本次 smoke 已经产生的 checkpoint、artifact manifest 和 run trace，
    避免因状态模型修正造成无意义重跑。

implications:
  positive:
    - 同一本书的状态目录随内容更新保持稳定。
    - 内容变化通过 fingerprint 触发 stage 失效，而不是制造新书。
    - artifact 丢失可以被恢复计划直接发现。
  negative:
    - 状态仓库需要维护一次 legacy id 迁移逻辑。
    - 恢复计划读取 artifact manifest 后还需要访问文件系统验证路径。

validation:
  tests:
    - book identity remains stable after source content changes
    - repeated bootstrap records one stable artifact manifest entry
    - missing checkpoint artifacts make the stage unsatisfied
