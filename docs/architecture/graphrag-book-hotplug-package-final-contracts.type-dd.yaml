schemaVersion: "1.0.0"
title: GraphRAG 单本书热插拔包最终合同
status: final
owner: qmd_graphrag
lastReviewed: "2026-06-02"
purpose: >
  汇总单本书热插拔包通过 R6 固定基准设计复审所需的规范性合同。
  本文档是对外实现和审计入口，R3/R5 修复文档仅保留为历史审计证据。
sourceAudit:
  passedRun: docs/architecture/graphrag-book-hotplug-package-audits/run-20260602-r6-after-r5-fixups/reports/final-summary.md
  baselinePolicy: reuse_r1_fixed_baselines
  result: 10_agents_all_passed
  historicalInputs:
  - docs/architecture/graphrag-book-hotplug-package-audits/historical-design-repairs/identity-schema-runtime-repair.type-dd.yaml
  - docs/architecture/graphrag-book-hotplug-package-audits/historical-design-repairs/manifest-query-migration-repair.type-dd.yaml
authority:
  rule: >
    This final contract is normative for implementation. Historical R3/R5
    fixup documents may be used for audit traceability, but external readers
    and implementers should use this document and the main Type DD as the
    stable design contract.
  precedence:
  - graphrag-book-hotplug-package.type-dd.yaml
  - graphrag-book-hotplug-package-final-contracts.type-dd.yaml
  - historical audit reports for traceability only
  nonGoals:
  - changing R1 fixed baseline dimensions
  - relaxing privacy or provider no-read constraints
  - treating global catalog as package authority
identityFieldSemantics:
  principle: 'Identity fields have fixed stability, generation, conflict, and privacy semantics.
    Implementations must not infer identity behavior from titles or mutable display metadata.

    '
  fields:
    bookId:
      stability: stable_across_package_generations_for_same_source_identity
      generatedFrom:
      - sourceHash
      - normalized identity algorithm version
      - optional manual conflict decision
      participatesInConflictDecision: true
      conflictRole: primary_book_identity
      mutability: immutable_after_publish
    sourceHash:
      stability: stable_for_source_content
      generatedFrom:
      - original source bytes or approved source surrogate
      participatesInConflictDecision: true
      conflictRole: content_identity
      mutability: immutable_after_publish
    packageVersion:
      stability: monotonic_semver_for_package_schema_and_layout
      generatedFrom:
      - package schema version
      - layout version
      - manifest schema version
      participatesInConflictDecision: false
      conflictRole: compatibility_only
      mutability: changes_only_when_package_schema_or_layout_changes
    packageGeneration:
      stability: unique_per_publish_of_same_bookId
      generatedFrom:
      - publish timestamp
      - manifestSha256
      - sourceHash
      - toolVersion
      participatesInConflictDecision: true
      conflictRole: replacement_generation_order
      mutability: immutable_after_publish
    canonicalTitle:
      stability: display_metadata
      generatedFrom:
      - source metadata
      - normalized user override
      participatesInConflictDecision: false
      conflictRole: diagnostic_only
      mutability: editable_by_metadata_migration
    titleSlug:
      stability: derived_display_locator
      generatedFrom:
      - canonicalTitle
      - sourceHash prefix
      participatesInConflictDecision: false
      conflictRole: human_readable_locator_only
      mutability: regenerated_when_canonicalTitle_changes
  replacementRules:
    sameBookIdSameSourceHashNewGeneration: replace_after_validation
    sameBookIdDifferentSourceHash: fail_closed_manual_decision_required
    sameSourceHashDifferentBookId: duplicate_candidate_manual_decision_required
    sameTitleDifferentSourceHash: visible_distinct_books
    titleChangeSameBookIdSourceHash: metadata_update_not_identity_conflict
  auditFields:
    required:
    - identityAlgorithmVersion
    - bookId
    - sourceHash
    - packageVersion
    - packageGeneration
    - canonicalTitle
    - titleSlug
    - identityDecisionReason
    - manualDecisionId
schemaVersionUpgradeMatrix:
  principle: 'Upgrade paths are explicit by schema version, layout version, qmd index schema,
    GraphRAG artifact schema, and producer lineage schema. A generic legacy shape is not enough
    to pass migration review.

    '
  matrixKey:
  - packageSchemaVersion
  - layoutVersion
  - qmdIndexSchema
  - graphRagArtifactSchema
  - producerLineageSchema
  rows:
  - id: hotplug_v1_current
    from:
      packageSchemaVersion: 1.0.0
      layoutVersion: book-hotplug-v1
      qmdIndexSchema: qmd-book-index-v1
      graphRagArtifactSchema: graphrag-output-v1
      producerLineageSchema: producer-lineage-v1
    outcome: mount_as_is
    requiredAction: validate_current_manifest_and_projection
    failureOutcome: quarantine_mount_candidate
  - id: distribution_manifest_v1_to_hotplug_v1
    from:
      packageSchemaVersion: distribution_manifest_1.0.0
      layoutVersion: legacy-book-root-v0
      qmdIndexSchema: qmd-build-manifest-v1
      graphRagArtifactSchema: qmd-output-manifest-v1
      producerLineageSchema: producer-runs-yaml-v1
    outcome: migrate_to_hotplug_v1
    requiredAction: run_full_legacy_distribution_migration
    failureOutcome: repair_required
  - id: qmd_index_schema_v0
    from:
      packageSchemaVersion: distribution_manifest_1.0.0
      layoutVersion: legacy-book-root-v0
      qmdIndexSchema: qmd-index-unknown-or-v0
      graphRagArtifactSchema: qmd-output-manifest-v1
      producerLineageSchema: producer-runs-yaml-v1
    outcome: rebuild_qmd_projection
    requiredAction: discard_legacy_qmd_index_and_rebuild_external_projection
    failureOutcome: visible_not_qmd_ready
  - id: graphrag_output_schema_v0
    from:
      packageSchemaVersion: distribution_manifest_1.0.0
      layoutVersion: legacy-book-root-v0
      qmdIndexSchema: qmd-build-manifest-v1
      graphRagArtifactSchema: graphrag-output-unknown-or-v0
      producerLineageSchema: producer-runs-yaml-v1
    outcome: visible_not_query_ready
    requiredAction: preserve_as_repair_evidence_and_require_graphrag_rebuild
    failureOutcome: repair_required
  - id: producer_lineage_missing
    from:
      packageSchemaVersion: distribution_manifest_1.0.0
      layoutVersion: legacy-book-root-v0
      qmdIndexSchema: qmd-build-manifest-v1
      graphRagArtifactSchema: qmd-output-manifest-v1
      producerLineageSchema: missing
    outcome: visible_not_query_ready
    requiredAction: mark_producer_provenance_missing
    failureOutcome: repair_required
  - id: unsupported_legacy_schema
    from:
      packageSchemaVersion: unknown
      layoutVersion: unknown
      qmdIndexSchema: unknown
      graphRagArtifactSchema: unknown
      producerLineageSchema: unknown
    outcome: fail_closed
    requiredAction: emit_unsupported_legacy_schema_diagnostic
    failureOutcome: fail_closed
  compatibilityDiagnostics:
    stableCodes:
    - missing_required_file
    - missing_source_closure
    - missing_qmd_build_manifest
    - missing_graphrag_output_manifest
    - missing_producer_lineage
    - rebuild_failed
    - tool_version_too_old
    - unsupported_legacy_schema
    - unsupported_layout_version
    - unsupported_qmd_index_schema
    - unsupported_graphrag_artifact_schema
    - unsupported_producer_lineage_schema
    - artifact_schema_incompatible
    - package_schema_incompatible
    - manual_decision_required
  fixtureContracts:
    requiredFixtures:
    - hotplug_v1_current_valid
    - distribution_manifest_v1_complete
    - distribution_manifest_v1_missing_source
    - distribution_manifest_v1_missing_qmd
    - distribution_manifest_v1_missing_graphrag
    - qmd_index_schema_v0_rebuild
    - graphrag_output_schema_v0_not_query_ready
    - producer_lineage_missing
    - duplicate_source_residue
    - unsupported_legacy_schema
    expectedForEachFixture:
    - input tree shape
    - expected matrix row id
    - expected outcome
    - expected diagnostics
    - expected migration evidence
    - expected rollback behavior
migrationEvidenceSchema:
  principle: 'Migration evidence must be sufficient to audit old and new identity, package
    closure, conversion decisions, failures, and rollback without reading provider payloads
    or absolute local paths.

    '
  requiredFields:
  - migrationId
  - migrationToolVersion
  - migrationStartedAt
  - migrationCompletedAt
  - decisionStatus
  - failureReason
  - rollbackPlan
  - sourceBookId
  - targetBookId
  - sourceHash
  - oldNormalizedHash
  - newNormalizedHash
  - oldProducerRunIds
  - newProducerRunIds
  - oldManifestPath
  - newManifestPath
  - oldManifestSha256
  - newManifestSha256
  - beforePackageRoot
  - afterPackageRoot
  - beforeArtifactHashes
  - afterArtifactHashes
  - compatibilityMatrixRowId
  - artifactConversionActions
  - producerProvenanceStatus
  producerProvenanceStatusValues:
  - preserved_verified
  - preserved_redacted
  - missing_marked_not_query_ready
  - rebuilt_by_actual_producer_run
  - unavailable_repair_required
  forbiddenFields:
  - providerRequestPayload
  - providerResponsePayload
  - rawPrompt
  - rawCompletion
  - absoluteLocalPath
  - secretValue
providerSensitiveClassExtensions:
  principle: 'Provider-related sensitive data includes payloads, caches, authentication configuration,
    local credential stores, and any reversible interaction material. Absence of exact path
    match does not make material exportable.

    '
  additionalForbiddenClasses:
    providerCaches:
      patterns:
      - '**/provider-cache/**'
      - '**/.cache/openai/**'
      - '**/.cache/jina/**'
      - '**/*provider-cache*'
      - '**/*llm-cache*'
    reversibleInteractions:
      patterns:
      - '**/*prompt*'
      - '**/*completion*'
      - '**/*response-body*'
      - '**/*request-body*'
      - '**/*conversation*'
      - '**/*token-usage*'
    providerAuthConfig:
      patterns:
      - '**/openai*.json'
      - '**/jina*.json'
      - '**/*provider-auth*'
      - '**/*api-key*'
      - '**/*bearer*'
    credentialStores:
      patterns:
      - '**/keychain/**'
      - '**/credentials.json'
      - '**/secrets.json'
      - '**/.aws/credentials'
      - '**/.config/*/credentials*'
  mountPackageRootSemantics:
    rule: 'BOOK_MANIFEST.mount.packageRoot is always a package-relative locator with value
      ".". Live vault absolute paths are scan-local state and must not appear in BOOK_MANIFEST.json.

      '
scannerNoReadContracts:
  principle: 'Importer, mount scanner, compatibility checker, migration scanner, and query
    gate must be able to classify packages without reading sensitive roots.

    '
  actors:
    importer:
      mayRead:
      - BOOK_MANIFEST.json
      - PUBLISH_READY.json
      - checksum sidecars
      - allowlisted package files
      mustNotRead:
      - provider payload roots
      - credential stores
      - runtime logs
      - raw recovery payloads
    mountScanner:
      mayRead:
      - manifest and sidecars
      - publish marker
      - file metadata and checksums
      mustNotRead:
      - provider payload roots
      - runtime diagnostic payloads
      - credential stores
    compatibilityChecker:
      mayRead:
      - schema metadata
      - artifact metadata rows
      - producer lineage summaries
      mustNotRead:
      - raw provider request or response bodies
      - raw prompts
      - raw completions
      - provider auth config
    queryGate:
      mayRead:
      - committed catalog projection
      - GraphRAG artifact metadata rows
      - qmd projection manifest
      mustNotRead:
      - provider payloads
      - credentials
      - raw logs
      providerCallPolicy: never_on_gate_failure
  missingSensitiveRootsRule: 'Missing sensitive roots are never required for query-ready.
    If a package needs sensitive roots to prove readiness, it is invalid and must be marked
    not_query_ready.

    '
qmdAvailabilityAndReexportPolicy:
  principle: 'qmd availability, local projection, re-export, and repack have explicit states.
    A readonly mounted package can be used locally without mutating the distributed package.

    '
  availabilityMatrix:
  - packageState: mounted
    qmdState: included_index_valid
    qmdQueryAllowed: true
    rebuildAllowed: false
    exportBehavior: include_existing_book_index_if_policy_allows
  - packageState: mounted
    qmdState: reindex_required
    qmdQueryAllowed: false
    rebuildAllowed: true
    exportBehavior: export_without_local_projection_by_default
  - packageState: mounted
    qmdState: reindexing
    qmdQueryAllowed: false
    rebuildAllowed: already_running
    exportBehavior: export_last_committed_package_only
  - packageState: mounted
    qmdState: projection_ready
    qmdQueryAllowed: true
    rebuildAllowed: false
    exportBehavior: exclude_local_projection_unless_repack_requested
  - packageState: mounted
    qmdState: projection_failed
    qmdQueryAllowed: false
    rebuildAllowed: true
    exportBehavior: export_package_with_repair_diagnostic_only
  - packageState: incompatible
    qmdState: schema_incompatible
    qmdQueryAllowed: false
    rebuildAllowed: false
    exportBehavior: export_as_visible_not_qmd_ready_only
  reexportPolicy:
    exportBookDefault: original_package_closure_only
    exportBookWithLocalProjection: 'Creates a new packageGeneration, includes qmd projection
      under qmd/index, recalculates freshnessDigest, and writes migration evidence.

      '
    repackRule: 'Repack is a publish operation. It must use staging, regenerate manifest and
      sidecars, and never mutate the mounted source package in place.

      '
  qmdIdempotencyKey:
    fields:
    - bookId
    - packageGeneration
    - freshnessDigest
    - qmdBuildManifestSha256
    - qmdConfigSha256
    - metadataSchemaDigest
    - sqliteSchemaDigest
qmdDiagnosticsSchema:
  principle: 'qmd diagnostics are stable, bounded, package-relative, and free of provider
    payloads and absolute paths.

    '
  requiredFields:
  - diagnosticId
  - bookId
  - packageGeneration
  - qmdState
  - errorCode
  - severity
  - packageRelativePath
  - freshnessDigest
  - rebuildId
  - retryable
  - repairHint
  - createdAt
  stableErrorCodes:
  - qmd_index_missing
  - qmd_index_schema_incompatible
  - qmd_freshness_digest_mismatch
  - qmd_rebuild_input_missing
  - qmd_rebuild_failed_io
  - qmd_rebuild_failed_schema
  - qmd_sqlite_replace_failed
  - qmd_projection_commit_failed
  - qmd_reexport_requires_repack
  - qmd_readonly_package_write_denied
  tests:
    requiredCases:
    - included index valid
    - reindex required
    - rebuild success
    - rebuild IO failure
    - schema incompatible
    - readonly package export default excludes local projection
    - repack includes local projection with new generation
    - stale idempotency key cancelled
compatibilityBridgeLifecycle:
  principle: 'Legacy compatibility locators and symlinks are temporary migration aids. They
    must have explicit creation, validation, expiry, and removal rules.

    '
  allowedBridgeTypes:
  - legacy_output_locator
  - legacy_runs_locator
  - legacy_source_locator
  - internal_relative_symlink
  lifecycleStates:
  - created
  - validated
  - used_for_one_migration_version
  - deprecated
  - removed
  - rejected
  rules:
  - Bridges must be package-relative and may not point outside the package.
  - Bridges are not allowed in exported hotplug-v1 packages by default.
  - Bridges expire after one successful BOOK_MANIFEST audit.
  - Symlink bridges require checksum-bound target metadata.
  - Repack removes bridge locators unless compatibility export is explicit.
  evidenceFields:
  - bridgeId
  - bridgeType
  - sourceRelativePath
  - targetRelativePath
  - createdAt
  - expiresAt
  - removalGeneration
  - validationStatus
normativePrecedence:
  rule: 'This R5 supplement refines and overrides narrower or ambiguous wording in the main
    Type DD and R3 supplement for the listed contracts. It does not create new audit criteria;
    it supplies design detail required by the existing fixed baseline.

    '
  overrides:
  - main readinessGates.qmdReadyGate.rebuildPolicy.idempotencyKey
  - R3 qmdAvailabilityAndReexportPolicy availabilityMatrix gaps
  - R3 qmdDiagnosticsSchema digest detail gaps
  - main queryEntrypoint catalog-projection ambiguity
  nonGoals:
  - changing R1 baseline dimensions
  - relaxing privacy or provider no-read constraints
  - treating global catalog as package authority
manifestSensitivitySchema:
  principle: 'BOOK_MANIFEST.json is safe for single-book distribution only when every field
    has an explicit sensitivity class and unknown fields fail closed.

    '
  sensitivityClasses:
    public:
      meaning: safe_for_distribution_without_redaction
    restricted:
      meaning: 'safe only after schema validation, package-relative path validation, bounded
        length checks, and secret scan.

        '
    redacted:
      meaning: exportable only as a redacted digest, code, or summary.
    forbidden:
      meaning: never allowed in BOOK_MANIFEST.json or manifest diagnostics.
  unknownFieldPolicy: fail_closed
  maxStringBytes:
    public: 4096
    restricted: 2048
    redacted: 512
  sectionRules:
    identity:
      public:
      - bookId
      - sourceHash
      - canonicalTitle
      - titleSlug
      - packageVersion
      - packageGeneration
      - identityAlgorithmVersion
      restricted:
      - createdAt
      - manualDecisionId
      - identityDecisionReason
      forbidden:
      - userName
      - userHomePath
      - absoluteLocalPath
    metadata:
      public:
      - title
      - authors
      - language
      - subjects
      - publisher
      - publicationDate
      - descriptionSummary
      - coverRelativePath
      restricted:
      - userTags
      - userNotesSummary
      - sourceLicense
      - sourceAttribution
      redacted:
      - privateNoteDigest
      - originalMetadataDigest
      forbidden:
      - privateNotesRaw
      - fullCommandLine
      - shellHistory
      - exceptionStackTrace
      - debugDump
      - absoluteOriginalPath
      - originalInboxPath
      - tempDirectoryPath
      - environmentVariableValue
    source:
      public:
      - sourcePath
      - sourceHash
      - sourceBytes
      - sourceKind
      restricted:
      - sourceProvenanceKind
      - redactionStatus
      redacted:
      - originalSourceLocatorDigest
      forbidden:
      - originalAbsoluteSourcePath
      - providerDownloadUrlWithToken
      - userHomeSourcePath
    input:
      public:
      - canonicalNormalizedPath
      - normalizedHash
      - normalizedBytes
      restricted:
      - normalizationToolVersion
      - normalizationConfigDigest
      forbidden:
      - rawProviderPrompt
      - rawProviderCompletion
    qmd:
      public:
      - buildManifestPath
      - indexPolicy
      - requiredArtifacts
      - qmdIndexSchema
      restricted:
      - freshnessDigest
      - qmdConfigSha256
      - metadataSchemaDigest
      forbidden:
      - sqliteDebugDump
      - rawQmdException
    graphrag:
      public:
      - outputManifestPath
      - queryReady
      - requiredArtifacts
      - artifactSchema
      restricted:
      - producerRunIds
      - graphRagArtifactSchema
      - parquetSchemaDigest
      - lancedbSchemaDigest
      - embeddingProfileFingerprint
      redacted:
      - modelProfileFingerprint
      forbidden:
      - rawPrompt
      - rawCompletion
      - tokenUsageDetails
      - providerHeaders
      - providerRequestPayload
      - providerResponsePayload
    compatibility:
      public:
      - minQmdGraphRagVersion
      - graphRagArtifactSchema
      - qmdIndexSchema
      restricted:
      - createdBy.toolName
      - createdBy.toolVersion
      - createdBy.platformClass
      redacted:
      - createdBy.commandDigest
      forbidden:
      - createdBy.fullCommandLine
      - createdBy.cwd
      - createdBy.environment
      - createdBy.hostname
      - createdBy.username
    diagnostics:
      public:
      - errorCode
      - severity
      - retryable
      restricted:
      - packageRelativePath
      - reasonCode
      - diagnosticId
      redacted:
      - exceptionClass
      - exceptionMessageSummary
      - stackTraceDigest
      forbidden:
      - exceptionStackTrace
      - matchedSecretText
      - rawLogLine
      - absoluteLocalPath
  producerRunIdPolicy:
    allowedPattern: ^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$
    forbiddenContent:
    - path_separator
    - user_home_marker
    - provider_name_with_account
    - bearer_or_api_key_fragment
    rule: 'producerRunIds are restricted identifiers. They may be used only after pattern
      validation and must not encode local paths, user names, provider account identifiers,
      or secrets.

      '
  manifestValidationTests:
    requiredCases:
    - manifest rejects unknown top-level section
    - metadata privateNotesRaw is forbidden
    - metadata userNotesSummary is bounded and secret-scanned
    - createdBy fullCommandLine is forbidden
    - createdBy commandDigest is allowed as redacted digest
    - producerRunIds reject path-like values
    - diagnostics exceptionStackTrace is forbidden
    - restricted packageRelativePath rejects absolute paths
    - forbidden provider payload fields fail closed
    - redacted fields contain digest or summary only
importerPrePublishValidationContract:
  principle: 'Staged import must validate compatibility before publication. Mount-scan validation
    is a second boundary, not the first compatibility check for an importer-controlled publish
    operation.

    '
  workflows:
    stagedImport:
      stagingRoot: graph_vault/.staging/imports/{importId}/{bookId}
      liveRoot: graph_vault/books/{bookId}
      requiredPrePublishChecks:
      - complete file copy into stagingRoot
      - BOOK_MANIFEST.json schema validation
      - manifest checksum sidecar validation
      - package-relative path validation
      - symlink and hardlink escape validation
      - required file presence validation
      - file checksum and byte count validation
      - package schema compatibility validation
      - qmd index schema compatibility validation
      - GraphRAG artifact schema compatibility validation
      - identity conflict validation
      - manifest sensitivity schema validation
      - producer evidence redaction validation
      publishAllowedWhen: all_required_pre_publish_checks_pass
      publishProtocol:
      - acquire per-book import lease
      - validate staged package with importer validator
      - write IMPORT_VALIDATED.json with validationDigest and fencingToken
      - acquire package publish lock
      - verify fencingToken still current
      - fsync staged package and parent directories
      - atomic rename stagingRoot to liveRoot
      - release locks after mount scan enqueue
      validationFailureOutcome:
      - leave liveRoot unchanged
      - write bounded diagnostic under local runtime state
      - retain stagingRoot for retry when retryable
      - move stagingRoot to quarantine when unsafe
      forbiddenBehavior:
      - publishing an incompatible package to liveRoot
      - relying on mount scan as the first compatibility check
      - writing import diagnostics inside distributable package closure
    directDirectoryCopy:
      rule: 'Direct copy remains supported as a user-friendly install mode, but it is not
        a staged import. The copied live-root candidate is mounted only after mount scan validation
        succeeds. Validation failure produces a fail-closed candidate diagnostic and must
        not mutate catalog projection.

        '
      candidateStatus: copied_unvalidated
  diagnostics:
    stableCodes:
    - import_manifest_schema_failed
    - import_manifest_checksum_failed
    - import_required_file_missing
    - import_path_escape_detected
    - import_package_schema_incompatible
    - import_qmd_schema_incompatible
    - import_graphrag_schema_incompatible
    - import_identity_conflict
    - import_sensitive_field_forbidden
    - import_pre_publish_validation_failed
  tests:
    requiredCases:
    - staged import validates compatibility before live-root rename
    - staged import failure leaves previous live root unchanged
    - direct copy invalid candidate does not project into catalog
    - staged import writes diagnostics outside package root
    - mount scan revalidates successfully imported package
producerCreationQualityGateContract:
  principle: >
    Book production, legacy backfill, and resume flows must prove single-book
    hotplug package quality before a book is considered copy-distributable.
    A previously completed book may avoid expensive regeneration, but it may
    not bypass package validation.
  gates:
    prePublishSourceTruth:
      phase: pre_publish_source_truth
      passCondition: source closure and migration source truth allow manifest generation
      failOutcome: >
        Write failed state/hotplug-quality-gate.json, do not create
        BOOK_MANIFEST.json or PUBLISH_READY.json in a live root.
    preLivePublishCandidate:
      phase: pre_live_publish_package_validation
      passCondition: >
        Candidate root containing current package directories plus candidate
        BOOK_MANIFEST.json and PUBLISH_READY.json passes
        validateBookHotplugPackage.
      failOutcome: >
        Write failed quality/runtime gates, keep live root unmounted, and do
        not publish PUBLISH_READY.json.
    postLivePublish:
      phase: post_live_publish_package_validation
      passCondition: live root passes validateBookHotplugPackage after manifest write
      failOutcome: >
        Remove PUBLISH_READY.json and sidecars, write failed gates, and raise a
        validation failure.
    backfillExistingPackage:
      phase: backfill_existing_package_validation
      passCondition: >
        Existing BOOK_MANIFEST.json, sidecars, PUBLISH_READY.json, and package
        closure pass validateBookHotplugPackage before --only-missing skips
        regeneration.
      failOutcome: >
        Write failed gates and fail closed. The package is not silently treated
        as already migrated.
    backfillPackage:
      phase: backfill_package_validation
      passCondition: newly built or force-verified package passes validation
      failOutcome: >
        Remove publish marker on live validation failure and report bounded
        diagnostics.
  evidenceFiles:
  - state/hotplug-quality-gate.json
  - state/hotplug-quality-gate.json.sha256
  - state/hotplug-quality-gate.json.sha256.meta.json
  - state/hotplug-runtime-gate.json
  - state/hotplug-runtime-gate.json.sha256
  - state/hotplug-runtime-gate.json.sha256.meta.json
  evidenceClosureRule: >
    Gate evidence is package-local and copyable, but it is excluded from
    BOOK_MANIFEST.files. Refreshing gate evidence must not change
    packageGeneration, manifestSha256, or required artifact checksums.
  copyDistributionDecision:
    allowedWhen:
    - validateBookHotplugPackage.ok is true
    - hotplug-quality-gate.status is passed
    - hotplug-quality-gate.copyDistributionAllowed is true
    - PUBLISH_READY.json and sidecars match BOOK_MANIFEST checksums
    deniedWhen:
    - source truth gate fails
    - candidate package validation fails
    - live package validation fails
    - existing package validation fails during --only-missing resume
    - forbidden sensitive material is present in package root
  implementationEvidence:
    realBackfillRun: hotplug-backfill-20260603012939480
    observedBooks: 38
    verifiedAlreadyMigrated: 38
    failed: 0
    catalogProjection:
      bookCount: 38
      identityCount: 38
      capabilityCount: 30
    tests:
    - test/graphrag-book-hotplug-backfill.test.ts
    - test/graphrag-book-hotplug-catalog.test.ts
qmdAvailabilityReasonMatrix:
  principle: 'qmd availability is a reasoned state matrix, not only a small list of state
    names. Each state fixes mount visibility, GraphRAG-only query, qmd retrieval, rebuild
    behavior, and diagnostics.

    '
  rows:
  - id: bundled_index_valid
    condition: qmd/index exists and freshness digest matches manifest
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: true
    rebuildAction: none
    diagnosticCode: qmd_ready_included_index_valid
  - id: missing_index_reindex_declared
    condition: qmd/index missing and manifest qmd.indexPolicy is reindex_on_mount
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: enqueue_local_projection_rebuild
    diagnosticCode: qmd_index_missing_reindex_declared
  - id: missing_index_reindex_not_declared
    condition: qmd/index missing and manifest lacks reindex_on_mount
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: none_until_repair_or_repack
    diagnosticCode: qmd_index_missing_policy_absent
  - id: stale_bundled_index
    condition: bundled qmd index exists but freshness digest differs
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: enqueue_if_reindex_allowed_else_repair_required
    diagnosticCode: qmd_freshness_digest_mismatch
  - id: qmd_schema_incompatible
    condition: qmd index schema is unsupported by local runtime
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: rebuild_if_inputs_and_converter_available_else_repair
    diagnosticCode: qmd_index_schema_incompatible
  - id: local_projection_valid
    condition: external projection freshness digest matches current package
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: true
    rebuildAction: none
    diagnosticCode: qmd_ready_local_projection_valid
  - id: global_projection_stale
    condition: catalog qmd projection references old packageGeneration
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: invalidate_and_rebuild_projection
    diagnosticCode: qmd_global_projection_stale
  - id: projection_failed
    condition: last qmd rebuild attempt failed
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: retry_when_retryable
    diagnosticCode: qmd_projection_failed
  - id: checksum_mismatch
    condition: qmd file checksum does not match manifest file entry
    packageMounted: true
    bookVisible: true
    graphRagOnlyQueryAllowed: true
    qmdRetrievalAllowed: false
    rebuildAction: quarantine_qmd_surface_or_repair
    diagnosticCode: qmd_artifact_checksum_mismatch
  invariant: 'qmd retrieval is allowed only for bundled_index_valid or local_projection_valid.
    GraphRAG-only query may remain available when the GraphRAG gate passes and qmd retrieval
    is not required by the query mode.

    '
qmdCanonicalIdempotencyAndDiagnostics:
  principle: 'All qmd rebuild triggers use one canonical idempotency key and one bounded diagnostic
    shape with explicit expected and observed digest values.

    '
  canonicalIdempotencyKey:
    name: qmdProjectionRebuildKey
    fields:
    - bookId
    - packageGeneration
    - freshnessDigest
    - qmdBuildManifestSha256
    - qmdConfigSha256
    - metadataSchemaDigest
    - sqliteSchemaDigest
    - qmdIndexSchema
    - normalizedHash
    format: 'sha256 of canonical JSON object containing the listed fields in sorted key order.

      '
    overrideRule: 'This key supersedes the narrower "{bookId}:{normalizedHash}:{qmd.indexSchema}:{qmd.toolVersion}"
      key in the main Type DD. No actor may use the narrower key for deduplication.

      '
  diagnosticsSchemaExtension:
    requiredFields:
    - diagnosticId
    - bookId
    - packageGeneration
    - qmdState
    - errorCode
    - severity
    - packageRelativePath
    - freshnessDigest
    - rebuildId
    - idempotencyKey
    - digestKind
    - expectedDigest
    - observedDigest
    - retryable
    - repairHint
    - createdAt
    digestKinds:
    - freshnessDigest
    - qmdBuildManifestSha256
    - qmdConfigSha256
    - metadataSchemaDigest
    - sqliteSchemaDigest
    - normalizedHash
    - fileSha256
    redactionRule: 'expectedDigest and observedDigest are hex digests or null. They must not
      include raw content, SQL rows, provider payloads, secrets, absolute paths, or unbounded
      exception text.

      '
  tests:
    requiredCases:
    - all rebuild actors compute identical key for same package state
    - narrower legacy idempotency key is rejected in new projections
    - freshness mismatch records expected and observed digest
    - checksum mismatch records digestKind fileSha256
    - diagnostic contains no provider payload or absolute path
qmdReindexActorLockMatrix:
  principle: 'Multiple actors may request qmd rebuild, but only one per-book projection owner
    may commit a generation for a canonical idempotency key.

    '
  locks:
    perBookLease: graph_vault/.locks/qmd-rebuild-{bookId}.lock
    projectionCommitLock: graph_vault/.locks/qmd-projection.lock
    fencingToken: qmdRebuildFencingToken
  actors:
  - actor: mount_scanner
    mayEnqueue: true
    mayBuild: false
    mayCommitProjection: false
    duplicateTaskBehavior: merge_by_canonical_idempotency_key
  - actor: importer
    mayEnqueue: true
    mayBuild: false
    mayCommitProjection: false
    duplicateTaskBehavior: merge_by_canonical_idempotency_key
  - actor: batch_runner
    mayEnqueue: true
    mayBuild: true
    mayCommitProjection: true
    duplicateTaskBehavior: skip_if_committed_same_key
  - actor: explicit_rebuild_command
    mayEnqueue: true
    mayBuild: true
    mayCommitProjection: true
    duplicateTaskBehavior: join_or_takeover_stale_lease
  - actor: query_reader
    mayEnqueue: false
    mayBuild: false
    mayCommitProjection: false
    duplicateTaskBehavior: read_last_committed_only
  compatibility:
    sameKeyConcurrentRequests: merge_to_single_task
    differentKeySameBook: newest_packageGeneration_cancels_stale_task
    interruptedBuild: retry_from_staging_if_fencing_token_valid
    staleLease: takeover_after_lease_expiry_and_staging_validation
    commitFailure: preserve_previous_projection_generation
    packageDeletedDuringBuild: cancel_and_remove_uncommitted_staging
  ownershipInvariant: 'A committed qmd projection records bookId, packageGeneration, idempotencyKey,
    freshnessDigest, writerActor, fencingToken, committedAt, and source BOOK_MANIFEST sha256.
    Readers must ignore projections whose recorded packageGeneration or idempotencyKey does
    not match the current package.

    '
manifestFirstDirectQueryResolver:
  principle: 'A GraphRAG query can be resolved from the book package manifest and package
    artifacts after mount validation. Global catalog projection is a rebuildable cache, not
    a required authority for direct query readiness.

    '
  resolverInputs:
    required:
    - graph_vault/books/{bookId}/BOOK_MANIFEST.json
    - BOOK_MANIFEST.json.sha256
    - BOOK_MANIFEST.graphrag.outputManifestPath
    - BOOK_MANIFEST.graphrag.requiredArtifacts
    - BOOK_MANIFEST.files entries for each required artifact
    - graphrag/output/qmd_output_manifest.json
    - graphrag/output/artifact-metadata.json
    - graphrag/runs redacted producer lineage summaries
    optionalCaches:
    - graph_vault/catalog/books.yaml
    - graph_vault/catalog/graph-capabilities.yaml
    - graph_vault/catalog/qmd-projection.yaml
  resolutionOrder:
  - validate manifest checksum sidecars
  - validate package-relative GraphRAG artifact paths
  - validate required artifact file entries and checksums
  - validate artifact metadata rows
  - validate producer lineage summaries
  - validate schema compatibility
  - validate runtime compatibility package schema, layout, qmd schema,
    GraphRAG artifact schema, minimum runtime version, provider fingerprint,
    and embedding dimension against BOOK_MANIFEST and qmd_output_manifest.json
  - compute query_ready or visible_not_query_ready
  - use catalog projection only as a cache if it agrees with manifest digest
  readonlyPackageRule: >
    Manifest-first query validation reads BOOK_MANIFEST.json, GraphRAG artifact
    metadata, runtime compatibility, and producer run summaries as immutable
    package files. It must not create durable locks, recovery files, repair
    sidecars, local caches, or any other runtime state under
    graph_vault/books/{bookId}.
  producerLineageBinding:
    requiredChecks:
    - producer run file exists for every BOOK_MANIFEST.graphrag.producerRunIds
    - run.runId equals the manifest producerRunId entry
    - run.bookId equals BOOK_MANIFEST.identity.bookId
    - run.status is succeeded for query-ready packages
    - real artifact metadata rows produced by a run are covered by
      run.artifactIds
    - durable output refresh rows may bind by stage, artifact kind, and checksum
      when later GraphRAG stages refresh shared files such as stats.json
    - artifact metadata producerStep matches the run stage, except historical
      manifest-derived rows whose file closure is validated by checksum and
      closure digest
    - artifact metadata rows for required artifacts include stageFingerprint
      and providerFingerprint
    - artifact metadata stageFingerprint matches run metadata.stageFingerprint
      or run.inputFingerprint for real artifacts
    - artifact metadata providerFingerprint matches the run metadata provider
      fingerprint, or the output manifest provider fingerprint when run
      metadata omits it
  producerLineageDiagnostics:
  - missing_producer_run:{runId}
  - producer_run_record_invalid:{runId}
  - producer_run_book_mismatch:{runId}
  - producer_run_status_not_succeeded:{runId}
  - producer_run_artifact_binding_mismatch:{runId}
  - producer_run_stage_mismatch:{runId}
  - producer_run_stage_fingerprint_mismatch:{runId}
  - producer_run_provider_fingerprint_mismatch:{runId}
  cacheMismatchPolicy: 'If catalog projection is missing, stale, or disagrees with the current
    manifest digest, direct query readiness is decided from manifest and package artifacts.
    The stale cache is invalidated and must not override manifest, hash, schema, or lineage
    failures.

    '
  forbiddenInputs:
  - provider payload roots
  - provider response logs
  - raw prompts
  - raw completions
  - secrets
  - absolute local paths
  tests:
    requiredCases:
    - direct query gate succeeds with catalog projection deleted
    - stale graph-capabilities cache cannot mark failed manifest as ready
    - missing artifact metadata row returns visible_not_query_ready
    - provider roots absent does not fail manifest-first query gate
    - manifest-first query gate does not write .lock or runtime files into the
      readonly package root
    - forged producer run artifactIds return visible_not_query_ready
    - forged producer run provider fingerprint returns visible_not_query_ready
graphRagArtifactGateStateMachine:
  principle: 'GraphRAG artifact readiness has one state machine covering copy, validation,
    mount visibility, query readiness, quarantine, diagnostics, and rollback.

    '
  states:
  - copied
  - candidate
  - validating
  - validated
  - mounted
  - query_ready
  - visible_not_query_ready
  - quarantined
  - rolled_back
  transitions:
  - from: copied
    to: candidate
    trigger: BOOK_MANIFEST and publish marker detected
    requiredEvidence:
    - manifest checksum sidecars
    - PUBLISH_READY.json
    diagnosticCode: graph_candidate_detected
    catalogProjectionEffect: none
    prohibitedQueryCondition: always_until_validated
  - from: candidate
    to: validating
    trigger: mount scanner or manifest-first resolver starts validation
    requiredEvidence:
    - package-relative paths
    - required artifact file entries
    diagnosticCode: graph_validation_started
    catalogProjectionEffect: none
    prohibitedQueryCondition: validation_not_complete
  - from: validating
    to: validated
    trigger: all checks pass
    requiredEvidence:
    - artifact checksums
    - artifact metadata rows
    - producer lineage summaries
    - schema compatibility
    diagnosticCode: graph_artifacts_validated
    catalogProjectionEffect: eligible_for_projection
    prohibitedQueryCondition: none
  - from: validated
    to: mounted
    trigger: package mount projection committed or direct resolver accepted
    requiredEvidence:
    - current manifestSha256
    - packageGeneration
    diagnosticCode: graph_mounted
    catalogProjectionEffect: mounted_without_query_ready_until_gate_passes
    prohibitedQueryCondition: query_gate_not_passed
  - from: mounted
    to: query_ready
    trigger: GraphRAG gate passes
    requiredEvidence:
    - required artifacts present
    - checksum binding
    - artifact metadata closure digest
    - producer output hash binding
    - compatible parquet and LanceDB schema digests
    diagnosticCode: graph_query_ready
    catalogProjectionEffect: query_capability_true
    prohibitedQueryCondition: none
  - from: mounted
    to: visible_not_query_ready
    trigger: non-sensitive repairable GraphRAG gate failure
    requiredEvidence:
    - stable diagnostic code
    - failed evidence kind
    diagnosticCode: graph_visible_not_query_ready
    catalogProjectionEffect: visible_query_capability_false
    prohibitedQueryCondition: GraphRAG query requiring failed artifacts
  - from: candidate
    to: quarantined
    trigger: unsafe path, checksum mismatch, corrupt sidecar, or payload leak
    requiredEvidence:
    - failure diagnostic
    - quarantine record
    diagnosticCode: graph_package_quarantined
    catalogProjectionEffect: remove_or_never_project
    prohibitedQueryCondition: always
  - from: visible_not_query_ready
    to: query_ready
    trigger: explicit repair or rebuild produces validated artifacts
    requiredEvidence:
    - new packageGeneration or external projection generation
    - updated artifact metadata closure digest
    diagnosticCode: graph_repair_query_ready
    catalogProjectionEffect: query_capability_true
    prohibitedQueryCondition: none
  - from: validating
    to: rolled_back
    trigger: validation crash or commit failure
    requiredEvidence:
    - rollback record
    diagnosticCode: graph_validation_rolled_back
    catalogProjectionEffect: preserve_last_good_generation
    prohibitedQueryCondition: current_candidate_not_queryable
  tests:
    requiredCases:
    - each state has one stable diagnostic code
    - checksum mismatch transitions to quarantined
    - lineage missing transitions to visible_not_query_ready
    - stale catalog cannot force query_ready
    - repair transition requires new evidence and does not reuse stale rows
migrationSourceTruthFailClosedTable:
  principle: 'Legacy migration may generate authoritative BOOK_MANIFEST.json only when the
    source-of-truth closure is sufficient. Missing critical evidence fails closed instead
    of fabricating package authority.

    '
  rows:
  - evidence: distribution_manifest.json
    requiredForAuthoritativeManifest: true
    missingOutcome: classify_as_residue_or_repair_required
    mayGenerateBookManifest: false
    diagnosticCode: migration_distribution_manifest_missing
  - evidence: distribution_manifest.json.sha256
    requiredForAuthoritativeManifest: true
    missingOutcome: repair_required
    mayGenerateBookManifest: false
    diagnosticCode: migration_manifest_sidecar_missing
  - evidence: qmd/qmd_build_manifest.json
    requiredForAuthoritativeManifest: true
    missingOutcome: visible_not_qmd_ready_only_if_inputs_complete
    mayGenerateBookManifest: true
    manifestRestriction: qmd.indexPolicy must be reindex_on_mount
    diagnosticCode: migration_qmd_build_manifest_missing
  - evidence: output/qmd_output_manifest.json
    requiredForAuthoritativeManifest: true
    missingOutcome: visible_not_query_ready
    mayGenerateBookManifest: true
    manifestRestriction: graphrag.queryReady must be false
    diagnosticCode: migration_graphrag_output_manifest_missing
  - evidence: canonical input
    requiredForAuthoritativeManifest: true
    missingOutcome: repair_required
    mayGenerateBookManifest: false
    diagnosticCode: migration_canonical_input_missing
  - evidence: runs/*.yaml producer lineage
    requiredForAuthoritativeManifest: true
    missingOutcome: visible_not_query_ready
    mayGenerateBookManifest: true
    manifestRestriction: producerProvenanceStatus must be missing_marked_not_query_ready
    diagnosticCode: migration_producer_lineage_missing
  - evidence: source closure
    requiredForAuthoritativeManifest: true
    missingOutcome: repair_required
    mayGenerateBookManifest: false
    diagnosticCode: migration_source_closure_missing
  - evidence: artifact file checksums
    requiredForAuthoritativeManifest: true
    missingOutcome: repair_required
    mayGenerateBookManifest: false
    diagnosticCode: migration_artifact_checksum_missing
  failClosedRule: 'If mayGenerateBookManifest is false, migration must not create BOOK_MANIFEST.json,
    PUBLISH_READY.json, or manifest checksum sidecars in a live root. It may write only migration
    evidence and repair diagnostics.

    '
migrationRerunIdempotencyContract:
  principle: 'Migration reruns are deterministic. They resume from evidence and copy-map checkpoints,
    never duplicate moves, never overwrite user metadata, and never change a validated package
    identity.

    '
  stateDetectionKeys:
  - legacyRoot
  - targetBookId
  - sourceHash
  - oldManifestSha256
  - newManifestSha256
  - migrationId
  - copyMapSha256
  - packageGeneration
  states:
    already_migrated:
      detection:
      - live root exists
      - BOOK_MANIFEST.json validates
      - migration evidence references same sourceHash and oldManifestSha256
      rerunBehavior: verify_only_no_copy_no_identity_change
      mayOverwriteUserMetadata: false
    partial_migration:
      detection:
      - staging root exists
      - copy-map checkpoint exists
      - no valid live root for target generation
      rerunBehavior: resume_from_copy_map_after_staging_validation
      mayOverwriteUserMetadata: false
    failed_interrupted:
      detection:
      - migration evidence status is migration_failed or rolled_back
      - staging or quarantine record exists
      rerunBehavior: require explicit resume_or_restart decision
      mayOverwriteUserMetadata: false
    legacy_only:
      detection:
      - legacy root exists
      - no target live root
      - no staging checkpoint for same sourceHash
      rerunBehavior: start_new_staged_migration
      mayOverwriteUserMetadata: false
  metadataProtection:
    protectedPaths:
    - metadata/**
    - state/user-overrides.yaml
    - BOOK_MANIFEST.local-overrides.json
    conflictPolicy: write_conflict_file_and_require_manual_decision
    forbiddenBehavior:
    - overwriting user-added metadata without matching digest
    - regenerating bookId for already_migrated package
    - replacing valid target live root from residue candidate
  checkpointFiles:
  - migrations/{migrationId}/classification.yaml
  - migrations/{migrationId}/copy-map.yaml
  - migrations/{migrationId}/checkpoint.yaml
  - migrations/{migrationId}/validation.yaml
  - migrations/{migrationId}/commit-record.yaml
  - migrations/{migrationId}/resume-plan.yaml
  - migrations/{migrationId}/rollback-record.yaml
  evidenceFiles:
    resumePlan:
      path: migrations/{migrationId}/resume-plan.yaml
      requiredFields:
      - migrationId
      - status
      - resumable
      - nextAction
      - partialMigrationCount
      - failedInterruptedCount
      - repairRequiredCount
      - pendingBookIds
      - processedBookIds
      - skippedBookIds
      - failureBookIds
    rollbackRecord:
      path: migrations/{migrationId}/rollback-record.yaml
      requiredFields:
      - migrationId
      - status
      - rollbackRequired
      - rollbackAvailable
      - restoreCatalogProjection
      - removePublishedBookIds
      - preservePublishedBookIds
      - failureBookIds
      - quarantineRoots
      - completedAt
  tests:
    requiredCases:
    - rerun already_migrated performs verify-only
    - partial_migration resumes from copy-map
    - interrupted migration requires explicit resume decision
    - user metadata conflict prevents overwrite
    - validated package identity remains unchanged across reruns
migrationConflictDecisionTable:
  principle: 'Migration conflicts fail closed into stable diagnostics and manual decision
    records. No residue candidate may replace a completed valid book implicitly.

    '
  manualDecisionRecord:
    requiredFields:
    - decisionId
    - conflictCode
    - sourceBookId
    - targetBookId
    - sourceHash
    - targetLiveRoot
    - candidateRoot
    - oldManifestSha256
    - candidateManifestSha256
    - selectedAction
    - decidedBy
    - decidedAt
    - reason
    forbiddenFields:
    - providerPayload
    - secretValue
    - absoluteLocalPath
    - rawLogLine
  conflicts:
  - condition: completed book and residue share source-hash prefix
    diagnosticCode: migration_source_hash_prefix_conflict
    defaultOutcome: quarantine_residue_candidate
    manualDecisionAllowed: true
    allowedActions:
    - keep_completed_quarantine_residue
    - archive_residue
    - promote_residue_after_full_validation
  - condition: target live root already exists
    diagnosticCode: migration_target_live_root_exists
    defaultOutcome: fail_closed_no_publish
    manualDecisionAllowed: true
    allowedActions:
    - keep_existing
    - replace_with_new_generation_after_validation
    - write_as_distinct_book
  - condition: staging target already exists
    diagnosticCode: migration_staging_target_exists
    defaultOutcome: resume_or_quarantine_staging
    manualDecisionAllowed: false
    allowedActions:
    - resume_if_copy_map_matches
    - quarantine_staging_if_mismatch
  - condition: same bookId with different sourceHash
    diagnosticCode: migration_book_id_source_hash_conflict
    defaultOutcome: fail_closed_manual_decision_required
    manualDecisionAllowed: true
    allowedActions:
    - keep_existing
    - assign_new_bookId_to_candidate
  - condition: same sourceHash with different bookId
    diagnosticCode: migration_duplicate_source_hash
    defaultOutcome: duplicate_candidate_not_mounted
    manualDecisionAllowed: true
    allowedActions:
    - merge_metadata_after_validation
    - keep_distinct_books
    - quarantine_duplicate
  - condition: directory content disagrees with manifest identity
    diagnosticCode: migration_manifest_identity_mismatch
    defaultOutcome: repair_required_no_manifest_generation
    manualDecisionAllowed: false
    allowedActions:
    - repair_source_or_manifest
    - quarantine_candidate
  - condition: generation or manifest differs from existing target
    diagnosticCode: migration_target_generation_conflict
    defaultOutcome: fail_closed_no_publish
    manualDecisionAllowed: true
    allowedActions:
    - keep_existing_generation
    - publish_new_generation_after_full_validation
  tests:
    requiredCases:
    - 38 completed books migrate without residue promotion
    - 34 residue directories quarantine by default
    - source-hash prefix conflict requires decision
    - existing live root is not overwritten automatically
    - staging mismatch is quarantined
    - manifest identity mismatch cannot generate BOOK_MANIFEST
fixedBaselineTestContracts:
  principle: 'The design repair is complete only if the same R1 fixed baselines can be exercised
    by concrete fixtures. These contracts do not add criteria; they make existing criteria
    executable.

    '
  securityPrivacy:
    requiredCases:
    - manifest forbidden field rejection
    - manifest restricted field redaction and bounded length
    - producer evidence allowed fields retained
    - producer evidence forbidden fields fail closed
    - importer no-read provider roots
    - mount scanner no-read provider roots
    - compatibility checker no-read provider roots
    - query gate no provider call on gate failure
  concurrentRunner:
    requiredCases:
    - staged importer compatibility validation before publish
    - direct copy invalid candidate fail closed
    - runner build staging invisible to mount scan
    - publish lock fencing prevents stale rename
  qmdIndex:
    requiredCases:
    - bundled qmd index valid
    - missing index with reindex_on_mount
    - missing index without reindex_on_mount
    - stale bundled index
    - qmd schema incompatible
    - local projection valid
    - global projection stale
    - projection failed retry
    - concurrent reindex coalescing
    - diagnostics include expected and observed digest
  graphRagQuery:
    requiredCases:
    - manifest-first direct query with catalog cache absent
    - stale catalog cache cannot force query_ready
    - artifact gate covers copied to query_ready transitions
    - lineage missing returns visible_not_query_ready
    - checksum mismatch quarantines candidate
    - runtime compatibility semantic digest mismatch fails closed
  stableDiagnostics:
    - runtime_compatibility_digest_mismatch:outputManifestSchemaDigest
    - runtime_compatibility_digest_mismatch:parquetSchemaDigest
    - runtime_compatibility_digest_mismatch:lancedbSchemaDigest
    - runtime_compatibility_digest_mismatch:artifactMetadataSchemaDigest
    - runtime_compatibility_package_schema_mismatch
    - runtime_compatibility_layout_mismatch
    - runtime_compatibility_qmd_index_schema_mismatch
    - runtime_compatibility_graphrag_artifact_schema_mismatch
    - runtime_compatibility_artifact_schema_mismatch
    - runtime_compatibility_min_runtime_mismatch
    - runtime_compatibility_provider_fingerprint_mismatch
    - runtime_compatibility_embedding_dimension_mismatch
    - artifact_metadata_missing_stage_fingerprint:{path}
    - artifact_metadata_missing_provider_fingerprint:{path}
    - producer_run_record_invalid:{runId}
    - producer_run_book_mismatch:{runId}
    - producer_run_status_not_succeeded:{runId}
    - producer_run_artifact_binding_mismatch:{runId}
    - producer_run_stage_mismatch:{runId}
    - producer_run_stage_fingerprint_mismatch:{runId}
    - producer_run_provider_fingerprint_mismatch:{runId}
  migrationCleanup:
    requiredCases:
    - source closure missing forbids manifest generation
    - producer runs missing marks not query ready
    - already_migrated rerun verify-only
    - partial_migration resumes from copy-map
    - failed_interrupted requires explicit decision
    - source-hash prefix conflict fail closed
    - target live root exists fail closed
    - user metadata conflict prevents overwrite
    - catalog cleanup after quarantine
