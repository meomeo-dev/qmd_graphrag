  offline_prompt_optimization_bus:
    role: Typed DSPy query prompt optimization bus.
    payloads:
      - name: dspy_query_prompt_optimization_request
        schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationRequestSchema
        envelope: src/contracts/dspy.ts#DspyOptimizationEnvelopeSchema
        storage: transient
        producers:
          - src/integrations/dspy.ts#optimizeQueryPrompt
        consumers:
          - src/integrations/dspy.ts#optimizeQueryPrompt
          - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
      - name: optimized_query_prompt_artifact
        schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationResponseSchema
        envelope: src/contracts/dspy.ts#DspyOptimizationResponseEnvelopeSchema
        storage: file
        producers:
          - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
        consumers:
          - finetune/experiments/gepa/dspy_gepa.py#main
      - name: dspy_generated_expansion_record
        schema: src/contracts/dspy.ts#DspyGeneratedExpansionRecordSchema
        envelope: src/contracts/dspy.ts#DspyGeneratedExpansionRecordEnvelopeSchema
        storage: file
        producers:
          - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
          - finetune/experiments/gepa/dspy_gepa.py#write_jsonl
        consumers:
          - finetune/experiments/gepa/dspy_gepa.py#load_queries
          - src/dspy/policy-store.ts#DspyPolicyStore.evaluateExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.expandQuery
      - name: dspy_optimization_run
        schema: src/contracts/dspy.ts#DspyOptimizationRunSchema
        envelope: src/contracts/dspy.ts#DspyOptimizationRunEnvelopeSchema
        storage: graph_vault/dspy/runs/<run_id>/run.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.writeOptimizationArtifact
        consumers:
          - src/cli/qmd.ts#dspyOptimizeQueryPrompt
      - name: dspy_optimization_artifact
        schema: src/contracts/dspy.ts#DspyOptimizationArtifactSchema
        envelope: src/contracts/dspy.ts#DspyOptimizationArtifactEnvelopeSchema
        storage: graph_vault/dspy/artifacts/<artifact_id>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.writeOptimizationArtifact
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.evaluateExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.loadRuntimePolicy
      - name: dspy_expansion_policy
        schema: src/contracts/dspy.ts#DspyExpansionPolicySchema
        envelope: src/contracts/dspy.ts#DspyExpansionPolicyEnvelopeSchema
        storage: transient
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.loadRuntimePolicy
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.expandQuery
          - src/store.ts#expandQuery
      - name: dspy_policy_pointer
        schema: src/contracts/dspy.ts#DspyPolicyPointerSchema
        envelope: src/contracts/dspy.ts#DspyPolicyPointerEnvelopeSchema
        storage: graph_vault/dspy/policies/query-expansion/current.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.rollbackExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.disableExpansionPolicy
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.loadRuntimePolicy
          - src/store.ts#expandQuery
      - name: dspy_pointer_lock_error
        schema: src/contracts/dspy.ts#DspyPointerLockErrorSchema
        envelope: src/contracts/dspy.ts#DspyPointerLockErrorEnvelopeSchema
        storage: transient
        producers:
          - src/dspy/policy-store.ts#DspyPointerLockError
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.rollbackExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.disableExpansionPolicy
      - name: dspy_evaluation_report
        schema: src/contracts/dspy.ts#DspyEvaluationReportSchema
        envelope: src/contracts/dspy.ts#DspyEvaluationReportEnvelopeSchema
        storage: graph_vault/dspy/reports/<report_id>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.evaluateExpansionPolicy
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
      - name: dspy_promotion_decision
        schema: src/contracts/dspy.ts#DspyPromotionDecisionSchema
        envelope: src/contracts/dspy.ts#DspyPromotionDecisionEnvelopeSchema
        storage: graph_vault/dspy/promotions/<decision_id>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.loadRuntimePolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.rollbackExpansionPolicy
      - name: dspy_promotion_history_entry
        schema: src/contracts/dspy.ts#DspyPromotionHistoryEntrySchema
        envelope: src/contracts/dspy.ts#DspyPromotionHistoryEntryEnvelopeSchema
        storage: graph_vault/dspy/history/<history_entry_id>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.promoteExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.rollbackExpansionPolicy
          - src/dspy/policy-store.ts#DspyPolicyStore.disableExpansionPolicy
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.rollbackExpansionPolicy
      - name: dspy_query_expansion_program_input
        schema: src/contracts/dspy.ts#DspyQueryExpansionProgramInputSchema
        envelope: src/contracts/dspy.ts#DspyQueryExpansionProgramInputEnvelopeSchema
        storage: transient
        producers:
          - src/store.ts#expandQuery
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.expandQuery
      - name: dspy_query_expansion_program_output
        schema: src/contracts/dspy.ts#DspyQueryExpansionProgramOutputSchema
        envelope: src/contracts/dspy.ts#DspyQueryExpansionProgramOutputEnvelopeSchema
        storage: transient
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.expandQuery
        consumers:
          - src/store.ts#expandQuery
      - name: dspy_metric_spec
        schema: src/contracts/dspy.ts#DspyMetricSpecSchema
        envelope: src/contracts/dspy.ts#DspyMetricSpecEnvelopeSchema
        storage: graph_vault/dspy/metrics/<metric_version>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.writeMetricSpec
          - src/cli/qmd.ts#dspyRegisterMetricSpec
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.loadMetricSpec
          - src/dspy/policy-store.ts#DspyPolicyStore.writeOptimizationArtifact
          - src/dspy/policy-store.ts#DspyPolicyStore.evaluateExpansionPolicy
          - src/cli/qmd.ts#dspyOptimizeQueryPrompt
          - src/cli/qmd.ts#dspyEvaluateExpansionPolicy
        notes:
          - metricVersion remains a typed scalar fallback when no registry
            entry is present.
      - name: dspy_evaluation_dataset
        schema: src/contracts/dspy.ts#DspyEvaluationDatasetSchema
        envelope: src/contracts/dspy.ts#DspyEvaluationDatasetEnvelopeSchema
        storage: graph_vault/dspy/datasets/<dataset_id>.yaml
        producers:
          - src/dspy/policy-store.ts#DspyPolicyStore.writeEvaluationDataset
          - src/cli/qmd.ts#dspyRegisterEvaluationDataset
        consumers:
          - src/dspy/policy-store.ts#DspyPolicyStore.loadEvaluationDataset
          - src/dspy/policy-store.ts#DspyPolicyStore.evaluateExpansionPolicy
          - src/cli/qmd.ts#dspyOptimizeQueryPrompt
          - src/cli/qmd.ts#dspyEvaluateExpansionPolicy
        notes:
          - dataset registry copies referenced JSONL files into graph_vault
            under dspy/dataset-files for portable optimization and evaluation.

  book_processing_state_bus:
