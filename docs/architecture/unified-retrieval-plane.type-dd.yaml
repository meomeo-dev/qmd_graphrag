          - src/provider/cost-accounting.ts#appendProviderCostAccounting

  vault_portability_bus:
    role: Typed restore bus for reconstructing qmd indexes from graph_vault.
    payloads:
      - name: vault_restore_request
        schema: src/contracts/vault.ts#VaultRestoreRequestSchema
        envelope: src/contracts/vault.ts#VaultRestoreRequestEnvelopeSchema
        storage: transient
        producers:
          - src/vault/restore.ts#restoreFromVault
        consumers:
          - src/vault/restore.ts#restoreFromVault
      - name: vault_restore_report
        schema: src/contracts/vault.ts#VaultRestoreReportSchema
        envelope: src/contracts/vault.ts#VaultRestoreReportEnvelopeSchema
        storage: graph_vault/catalog/restore-audits.jsonl
        producers:
          - src/vault/restore.ts#restoreFromVault
        consumers:
          - src/vault/restore.ts#restoreFromVault

schema_declarations:
  corpus_document:
    schema: src/contracts/corpus.ts#CorpusDocumentSchema
    envelope: src/contracts/corpus.ts#CorpusDocumentEnvelopeSchema
    role: >-
      Declares the stable qmd document projection shape. Current runtime
      routing consumes qmd_retrieval_candidate payloads produced from qmd
      SQLite rows by projectQmdDocumentLineage.
    producer: src/query/qmd-lineage.ts#projectQmdDocumentLineage
    consumer: src/query/qmd-candidates.ts#toQmdRetrievalCandidates
    storage: .qmd/index.sqlite raw document rows
    contract_level: schema_declaration
  corpus_chunk:
    schema: src/contracts/corpus.ts#CorpusChunkSchema
    envelope: src/contracts/corpus.ts#CorpusChunkEnvelopeSchema
    role: >-
      Declares the stable qmd chunk projection shape. Current runtime routing
      projects qmd chunk identity into qmd_retrieval_candidate evidence.
    producer: src/query/qmd-lineage.ts#buildQmdChunkLineageId
    consumer: src/query/qmd-candidates.ts#toQmdRetrievalCandidates
    storage: .qmd/index.sqlite raw chunk rows
    contract_level: schema_declaration

config_projection:
  qmd_project_config:
    path: .qmd/index.yml
    priority:
      - explicit_config_argument
      - nearest_project_qmd_config
      - configured_global_qmd_index
    owns:
      - collections
      - models
      - providers
      - graphrag
      - query
    secret_policy: env_name_only
    query_default_route_values:
      - qmd
      - auto
    query_default_route_rule: >-
      `graphrag` is an explicit capability route selected with
      `qmd query --graphrag`; it is not a valid unflagged default route.
  graphrag_runtime_config:
    path: graph_vault/settings.yaml
    owns:
      - GraphRAG provider projection
      - GraphRAG storage projection
    source_of_truth: .qmd/index.yml
    drift_control:
      - managed_header
      - source_fingerprint
      - reject_on_fingerprint_mismatch
    secret_policy: env_placeholder_only
  runtime_env:
    required_names:
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - JINA_API_KEY
    persistence_rule: Values are never persisted in catalog, checkpoint, or query logs.
    dotenv_loader:
      producer: src/cli/qmd.ts#loadProjectDotenvForCli
      project_root_rule: nearest_.qmd_index_parent
      precedence: existing_environment_wins
      consumers:
        - src/integrations/python-bridge.ts#callPythonBridge
        - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
        - finetune/experiments/gepa/responses_lm.py#OpenAIResponsesDspyLM

provider_contracts:
  openai_responses:
    endpoint: /responses
    stream: true
    strict_structured_output: true
    object_schema_rule: >
      OpenAI Responses structured output JSON schema object nodes require
      additionalProperties=false.
    plain_completion_rule: >
      Plain completion requests omit text.format and still use stream=true.
    version_prefix_rule: no_forced_v1_prefix
    dspy_runtime_rule: >-
      DSPy offline optimization uses OpenAIResponsesDspyLM and must call
      OPENAI_BASE_URL plus /responses with stream=true; chat completions are
      outside this boundary.
  jina:
    roles:
      - embedding_provider
      - rerank_provider
    required_env:
      - JINA_API_KEY

query_routes:
  qmd:
    corpus_scope: whole
    cost: low_to_medium
    entrypoint: qmd query
    strengths:
      - lexical_search
      - vector_search
      - rerank
      - source_location
    limitations:
      - no_native_graph_reasoning
  graphrag:
    corpus_scope: graph_enhanced_subset
    cost: medium_to_high
    entrypoint: qmd query --graphrag
    strengths:
      - graph_local_search
      - graph_global_search
      - drift_search
      - community_report_grounding
    limitations:
      - only_graph_query_capable_documents
  auto:
    corpus_scope: whole_then_graph_enhanced_subset
    cost: route_decision_dependent
    entrypoint: qmd query --mode auto
    rule: qmd_recall_first_then_typed_graph_upgrade
    upgrade_requirements:
      - graph_synthesis_intent
      - graph_coverage_threshold_satisfied
      - cost_policy_allows_upgrade

route_decision_primitives:
  intent_class_values:
    - lookup
    - source_location
    - chunk_retrieval
    - single_document_summary
    - graph_synthesis
    - multi_hop_reasoning
  graph_coverage_formula: graphReadyCandidateCount / totalCandidateCount
  cost_class_values:
    - low
    - medium
    - high
  refusal_reason_values:
    - no_graph_ready_candidate
    - coverage_below_threshold
    - intent_not_graph_synthesis
    - cost_policy_exceeded
    - graph_upgrade_disabled
    - capability_missing
  execution_error_code_values:
    - provider_unavailable
    - provider_response_invalid

route_contracts:
  unified_query_request:
    schema: src/contracts/unified-query.ts#UnifiedQueryRequestSchema
    envelope: src/contracts/unified-query.ts#UnifiedQueryRequestEnvelopeSchema
    required_fields:
      - schemaVersion
      - query
      - requestedRoute
    optional_fields:
      - collections
      - method
      - maxCostClass
      - graphCoverageThreshold
      - allowGraphUpgrade
      - explainRoute
      - metadata
  qmd_search_result:
    schema: src/contracts/qmd-query.ts#QmdSearchResultSchema
    envelope: src/contracts/qmd-query.ts#QmdSearchResultEnvelopeSchema
    required_fields:
      - schemaVersion
      - query
      - results
    optional_fields:
      - elapsedMs
      - metadata
  graphrag_query_response:
    schema: src/contracts/graphrag.ts#GraphRagQueryResponseSchema
    envelope: src/contracts/graphrag.ts#GraphRagQueryResponseEnvelopeSchema
    required_fields:
      - schemaVersion
      - method
      - responseText
      - evidence
    optional_fields:
      - providerDetail
  unified_answer:
    schema: src/contracts/unified-query.ts#UnifiedAnswerSchema
    envelope: src/contracts/unified-query.ts#UnifiedAnswerEnvelopeSchema
    required_fields:
      - schemaVersion
      - query
      - routeDecision
      - answerText
      - evidence
    optional_fields:
      - providerDetail
      - elapsedMs
      - metadata
  graph_capability_error:
    schema: src/contracts/unified-query.ts#GraphCapabilityErrorSchema
    envelope: src/contracts/unified-query.ts#GraphCapabilityErrorEnvelopeSchema
    rule: >-
      `--graphrag` against a non-graph-ready source returns a typed capability
      error and does not silently fall back to plain qmd retrieval.
    required_fields:
      - schemaVersion
      - route
      - provider
      - capability
      - code
      - retryable
      - queriedScope
      - sourceId
      - documentId
      - bookId
      - redactedMessage
  query_route_decision:
    schema: src/contracts/unified-query.ts#QueryRouteDecisionSchema
    graph_scope_source: >-
      When selectedRoute is graphrag, selectedSourceIds, selectedDocumentIds,
      and selectedContentHashes are derived from selected GraphCapability
      records.
    required_fields:
      - requestedRoute
      - selectedRoute
      - status
      - reasonCode
      - intentClass
      - costClass
      - maxCostClass
      - graphCoverage
      - candidateDistribution
      - selectedSourceIds
      - selectedDocumentIds
      - selectedContentHashes
      - selectedBookIds
      - candidateEvidenceIds
      - graphCapabilityIds
      - graphArtifactIds
      - candidateDecisions
      - refusalReasons
  candidate_route_decision:
    schema: src/contracts/unified-query.ts#CandidateRouteDecisionSchema
    required_fields:
      - candidateId
      - sourceId
      - documentId
      - bookId
      - isGraphReady
      - retrievalScore
      - rerankScore
      - selected
      - selectionReason
      - refusalReason
  typed_query_error:
    schema: src/contracts/unified-query.ts#TypedQueryErrorSchema
    required_fields:
      - schemaVersion
      - route
      - stage
      - provider
      - capability
      - code
      - retryable
      - redactedMessage
  evidence_ref:
    schema: src/contracts/unified-query.ts#EvidenceRefSchema
    required_fields:
      - sourceId
      - documentId
      - contentHash
      - chunkId
      - bookId
      - graphCapabilityId
      - graphTextUnitId
      - artifactId
      - locator

state_and_recovery:
  processing_unit: source_document
  graph_business_unit: book_id
  recovery_unit: book_id_plus_processing_stage
  cache_unit: normalized_provider_request_hash
  commit_rule: >-
    A processing stage is committed only after required artifact manifests
    pass schema validation and vault-relative paths resolve from graph_vault.
  canonical_readiness:
    source: validated_checkpoint_plus_validated_manifest
    qmd_corpus_registration_gate: >-
      DocumentIdentityMap.metadata.qmdCorpusRegistered must be true before
      query_ready checkpoint completion can publish graph capability records.
    mirrors:
      - graph_capability
      - qmd_sqlite_capability_mirror
  restore_from_vault:
    request_schema: src/contracts/vault.ts#VaultRestoreRequestSchema
    report_schema: src/contracts/vault.ts#VaultRestoreReportSchema
    inputs:
      - graph_vault/input
      - graph_vault/catalog/sources.yaml
      - graph_vault/catalog/document-identity-map.yaml
      - graph_vault/catalog/graph-capabilities.yaml
      - validated_artifact_manifest
    outputs:
      - .qmd/index.sqlite
      - qmd_capability_mirror
    consistency_rule: >-
      Restored document content hash, document identity map contentHash, and
      graph capability contentHash must match before capability mirror restore.
    report_required_fields:
      - documentsPortable
      - capabilitiesPortable
      - restoredDocumentCount
      - restoredCapabilityCount
      - failedItems
    audit_trail:
      storage: graph_vault/catalog/restore-audits.jsonl
      schema: src/contracts/vault.ts#VaultRestoreReportSchema
  invalidation:
    source_hash_change: invalidates_all_downstream_artifacts
    normalized_content_hash_change: invalidates_chunks_and_graph_artifacts
    prompt_fingerprint_change: invalidates_prompt_dependent_artifacts
    model_fingerprint_change: invalidates_model_dependent_artifacts
    provider_config_change: invalidates_provider_dependent_artifacts
  kind_specific_validators:
    - parquet_content_hash
    - lancedb_required_tables
    - lancedb_non_empty_data_fragments
    - lancedb_row_count_sidecar
    - lancedb_canonical_hash_excludes_vendor_versions
    - graphrag_output_manifest
    - vault_relative_path_resolution
  batch_isolation:
    rule: Single-book failure does not roll back committed documents or capabilities for other books.

cost_accounting:
  schema: src/contracts/provider.ts#ProviderCostAccountingSchema
  envelope: src/contracts/provider.ts#ProviderCostAccountingEnvelopeSchema
  required_fields:
    - sourceId
    - documentId
    - bookId
    - contentHash
    - stage
    - provider
    - model
    - requestCount
    - tokenCount
    - tokenCountStatus
    - embeddingCount
    - embeddingCountStatus
    - cacheHit
    - runId
    - requestArtifactId
    - lineageMode
    - artifactIds
  qmd_jina_scope: >-
    qmd embedding and rerank calls emit request-level accounting. Source and
    book identities are nullable for qmd-only corpus calls. Document and
    content identities are projected from qmd SQLite when the request is tied
    to corpus content. Records without corpus identity are valid only with
    lineageMode transient_query. Every request-level accounting record
    references a redacted provider request artifact under
    graph_vault/catalog/provider-requests.
  graphrag_scope: >-
    GraphRAG index and query calls emit request-level accounting. Every
    GraphRAG accounting record includes the redacted request fingerprint
    artifact and the validated business artifact ids that explain query or
    index lineage. GraphRAG records use lineageMode graph_artifact.
  graphrag_openai_scope: >-
    OpenAI Responses stream events are internal to the GraphRAG Python provider
    adapter. ProviderCostAccounting records GraphRAG index/query as aggregate
    adapter calls with provider `graphrag` unless GraphRAG exposes
    provider-specific OpenAI usage detail.
  count_status_rule: >-
    tokenCount and embeddingCount keep numeric values for aggregation.
    tokenCountStatus and embeddingCountStatus declare whether the count is
    reported, estimated, or unknown; unknown counts use numeric 0 only as an
    aggregation-neutral value.
  provider_request_fingerprint:
    schema: src/contracts/provider.ts#ProviderRequestFingerprintSchema
    envelope: src/contracts/provider.ts#ProviderRequestFingerprintEnvelopeSchema
    storage: graph_vault/catalog/provider-requests/<artifact_id>.json
    rule: >-
      Request sidecars persist redacted request fingerprints and sanitized
      metadata only. Secret values and raw provider payloads are excluded.
  lineage_mode_rule: >-
    lineageMode is corpus_artifact, graph_artifact, multi_document_query, or
    transient_query. artifactIds must include requestArtifactId.
  graphrag_jina_scope: >-
    GraphRAG-side Jina embedding is observed through the GraphRAG adapter as
    graph indexing cost unless the GraphRAG runtime emits provider-specific
    usage detail.

security_contract:
  redaction_before_persistence: true
  forbidden_persistent_values:
    - secret_values
    - provider_authorization_headers
    - raw_provider_error_payloads
    - host_absolute_paths_as_identity
    - unsanitized_metadata_keys_or_values
  covered_payloads:
    - catalog
    - artifact_manifest
    - checkpoint
    - query_log
    - query_response
    - stdout_tail
    - stderr_tail
    - error_summary

design_decisions:
  graph_capability_storage:
    canonical: validated_checkpoint_plus_validated_manifest
    catalog_role: Rebuildable capability projection for route decisions.
    qmd_sqlite_role: Query-accelerating mirror rebuilt from the canonical catalog.
    validation_rule: >-
      Explicit capability catalog entries are consumed only when the
      corresponding query-ready checkpoint references validated community-report
      and embedding artifacts. Artifact stage remains the producer stage
      (`community_report` or `embed`) and is not rewritten to `query_ready`.
    merge_rule: >-
      Book-state derived capabilities are authoritative. Explicit catalog
      entries supplement only capability semantic keys that are absent from the
      derived set and never overwrite matching bookId/kind/method entries.
  normalized_book_materialization:
    canonical: graph_vault/input
    qmd_collection_role: qmd registers graph_vault/input as a normal collection.
  graphrag_context_normalization:
    answer_contract: GraphRAG evidence is normalized into EvidenceRef.
    provider_detail: >-
      GraphRAG provider detail is a typed provider/method payload. Raw provider
      context tables remain bridge-internal state and do not cross the data bus.
  vendor_boundary:
    rule: >-
      GraphRAG vendor code remains an upstream-aligned dependency. qmd_graphrag
      routing, configuration, and Type DD contracts live outside vendor code.
    controls:
      - version_pin
      - adapter_layer_only
      - no_business_route_logic_in_vendor
      - upgrade_smoke_test

acceptance_requirements:
  - Graph-enhanced sources are searchable by plain qmd query.
  - GraphRAG query reads only sources with graph_query capability.
  - Auto route emits QueryRouteDecision for every graph upgrade or refusal.
  - Every cross-runtime request and response has a zod schema.
  - EvidenceRef resolves to source, document, chunk, or graph text unit identity.
  - graph_vault remains portable across host paths and devices.
  - Provider secrets resolve only through environment variable names.
  - CLI and MCP query entries share the same typed route service.
  - Responses API uses stream mode. Calls that require structured results use
    strict structured output schemas; plain completion calls omit text.format.
  - Jina embedding and rerank payloads are both on the provider bus.
  - Cost accounting resolves provider, model, run, and artifact lineage.
  - Python bridge tests run with declared python/requirements-test.txt dependencies.
