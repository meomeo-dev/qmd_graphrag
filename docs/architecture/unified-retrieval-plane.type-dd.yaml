        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.appendRunRecord
        consumers:
          - src/job-state/repository.ts#FileBookJobStateRepository.listRunRecords
      - name: book_run_record
        schema: src/contracts/book-job.ts#BookJobRunRecordSchema
        envelope: src/contracts/book-job.ts#BookJobRunRecordEnvelopeSchema
        storage: graph_vault/books/<book_id>/runs/<run_id>.yaml
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.appendRunRecord
        consumers:
          - src/job-state/repository.ts#FileBookJobStateRepository.listRunRecords
      - name: provider_cost_accounting
        schema: src/contracts/provider.ts#ProviderCostAccountingSchema
        envelope: src/contracts/provider.ts#ProviderCostAccountingEnvelopeSchema
        storage: graph_vault/catalog/cost-accounting.jsonl
        producers:
          - src/integrations/graphrag.ts#runGraphRagIndex
          - src/integrations/graphrag.ts#runGraphRagQuery
