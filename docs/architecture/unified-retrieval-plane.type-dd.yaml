identity_model:
  source_id:
    description: Stable identity of the original source payload.
    producer: src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
    canonical_derivation: sourceHash
    locator_fields:
      - sourceName
      - sourceRelativePath
    invariant: Path fields do not participate in canonical identity.
  document_id:
    description: qmd document identity projected for whole-corpus retrieval.
    producer: src/query/qmd-lineage.ts#projectQmdDocumentLineage
    sqlite_row_source: src/store.ts#insertDocument
    fields:
      - sourceId
      - contentHash
      - normalizationPolicyVersion
    locator_fields:
      - collection
      - relativePath
    invariant: Path fields do not participate in canonical document identity.
  book_id:
    description: Book-level GraphRAG processing identity.
    producer: src/job-state/fingerprint.ts#buildBookIdFromSourceHash
    canonical_derivation: sourceHash
    display_fields:
      - bookDisplaySlug
    invariant: Same source payload produces the same bookId across devices.
  content_hash:
    description: Stable identity of normalized text content.
    producer: src/store.ts#hashContent
    fields:
      - normalizedText
      - normalizationPolicyVersion
  chunk_id:
    description: qmd chunk identity projected for retrieval evidence.
    producer: src/query/qmd-lineage.ts#buildQmdChunkLineageId
    graph_ingest_mirror_producer: src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    fields:
      - contentHash
      - seq
  graph_text_unit_id:
    description: GraphRAG text unit identity.
    producer: src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    source_table: vendor/graphrag#text_units.parquet
    fields:
      - graphRagTextUnitId
    invariant: >-
      GraphRAG text units are evidence identities linked to qmd by
      sourceId/documentId/contentHash capability lineage, not by qmd chunkId.
  graph_document_id:
    description: GraphRAG document identity.
    producer: src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    source_table: vendor/graphrag#documents.parquet
    fields:
      - graphDocumentId
    invariant: >-
      DocumentIdentityMap persists graphDocumentId and graphTextUnitIds so
      query scope and evidence lineage are auditable without relying on
      GraphRAG document title as an authority.

deduplication:
  high_cost_key:
    fields:
      - sourceHash
      - contentHash
      - stageFingerprint
      - providerFingerprint
  rule: >-
    Locator changes do not invalidate high-cost artifacts. providerFingerprint
    represents the redacted provider request boundary and participates in
    artifact deduplication and resume checks.
  excluded_fields:
    - artifactPath
    - artifactLocator
    - runId

typed_buses:
  corpus_bus:
    role: Whole-corpus ingestion and document identity.
    invariant: Every graph-enhanced source is registered on this bus first.
    payloads:
      - name: source_document
        schema: src/contracts/corpus.ts#SourceDocumentSchema
        envelope: src/contracts/corpus.ts#SourceDocumentEnvelopeSchema
        storage: graph_vault/catalog/sources.yaml
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
        consumers:
          - src/vault/restore.ts#restoreFromVault
      - name: source_document_catalog
        schema: src/contracts/corpus.ts#SourceDocumentCatalogSchema
        envelope: src/contracts/corpus.ts#SourceDocumentCatalogEnvelopeSchema
        storage: graph_vault/catalog/sources.yaml
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
        consumers:
          - src/vault/restore.ts#restoreFromVault
      - name: corpus_document
        schema: src/contracts/corpus.ts#CorpusDocumentSchema
        envelope: src/contracts/corpus.ts#CorpusDocumentEnvelopeSchema
        storage: .qmd/index.sqlite
        producers:
          - src/query/qmd-lineage.ts#projectQmdDocumentLineage
        consumers:
          - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
        contract_level: schema_declaration
        invariant: >-
          qmd SQLite document rows are projected into this stable shape before
          qmd_retrieval_candidate construction; this payload is a typed
          projection contract, not a standalone graph_vault artifact.
      - name: corpus_chunk
        schema: src/contracts/corpus.ts#CorpusChunkSchema
        envelope: src/contracts/corpus.ts#CorpusChunkEnvelopeSchema
        storage: .qmd/index.sqlite
        producers:
          - src/query/qmd-lineage.ts#buildQmdChunkLineageId
        consumers:
          - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
        contract_level: schema_declaration
        invariant: >-
          qmd chunk rows are projected into stable chunk identities consumed by
          qmd_retrieval_candidate evidence; GraphRAG text units remain linked
          through document_identity_map and graph_text_unit_identity_map.
      - name: document_identity_map
        schema: src/contracts/corpus.ts#DocumentIdentityMapSchema
        envelope: src/contracts/corpus.ts#DocumentIdentityMapEnvelopeSchema
        storage: graph_vault/catalog/document-identity-map.yaml
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
          - src/job-state/repository.ts#FileBookJobStateRepository.recordDocumentChunks
          - src/job-state/repository.ts#FileBookJobStateRepository.recordQmdCorpusRegistration
          - src/job-state/repository.ts#FileBookJobStateRepository.recordGraphTextUnitIdentity
        consumers:
          - src/graphrag/capability-catalog.ts#loadGraphCapabilities
          - src/query/qmd-candidates.ts#loadDocumentIdentitiesFromGraphVault
          - src/job-state/repository.ts#FileBookJobStateRepository.validateQueryReadyGraphIdentity
          - src/vault/restore.ts#restoreFromVault
      - name: graph_text_unit_identity_map
        schema: src/contracts/corpus.ts#GraphTextUnitIdentityMapSchema
        envelope: src/contracts/corpus.ts#GraphTextUnitIdentityMapEnvelopeSchema
        storage: graph_vault/catalog/document-identity-map.yaml
        producers:
          - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
        consumers:
          - src/job-state/repository.ts#FileBookJobStateRepository.recordGraphTextUnitIdentity
          - python/qmd_graphrag/bridge.py#_filter_graphrag_frames_for_scope
        source_tables:
          - vendor/graphrag#documents.parquet
          - vendor/graphrag#text_units.parquet
        required_identity_fields:
          - sourceId
          - sourceHash
          - documentId
          - contentHash
      - name: document_identity_catalog
        schema: src/contracts/corpus.ts#DocumentIdentityCatalogSchema
        envelope: src/contracts/corpus.ts#DocumentIdentityCatalogEnvelopeSchema
        storage: graph_vault/catalog/document-identity-map.yaml
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
        consumers:
          - src/graphrag/capability-catalog.ts#loadGraphCapabilities
          - src/vault/restore.ts#restoreFromVault

  qmd_retrieval_bus:
    role: Fast whole-corpus lexical, vector, expansion, and rerank retrieval.
    invariant: Formatter strings are not consumed by downstream retrieval logic.
    payloads:
      - name: qmd_query_request
        schema: src/contracts/qmd-query.ts#QmdQueryRequestSchema
        envelope: src/contracts/qmd-query.ts#QmdQueryRequestEnvelopeSchema
        storage: transient
        producers:
          - src/cli/qmd.ts#querySearch
          - src/mcp/server.ts#createMcpServer
        consumers:
          - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
          - src/query/unified-router.ts#routeQuery
        invariant: >-
          qmd_query_request expresses direct qmd whole-corpus retrieval intent;
          unified_query_request wraps user-facing route selection for qmd,
          graphrag, and auto routes.
      - name: qmd_retrieval_candidate
        schema: src/contracts/qmd-query.ts#QmdRetrievalCandidateSchema
        envelope: src/contracts/qmd-query.ts#QmdRetrievalCandidateEnvelopeSchema
        storage: transient
        producers:
          - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
        consumers:
          - src/query/unified-router.ts#decideRoute
          - src/query/unified-answer.ts#buildUnifiedAnswer
        invariant: >-
          sourceId is read from document_identity_map; unknown sourceId is
          null and is not derived from contentHash.
      - name: qmd_search_result
        schema: src/contracts/qmd-query.ts#QmdSearchResultSchema
        envelope: src/contracts/qmd-query.ts#QmdSearchResultEnvelopeSchema
        storage: transient
        producers:
          - src/cli/qmd.ts#searchQmdForUnifiedRoute
          - src/mcp/server.ts#createMcpServer
        consumers:
          - src/cli/qmd.ts#querySearch
          - src/cli/qmd.ts#autoQuerySearch
          - src/query/unified-answer.ts#buildUnifiedAnswer
      - name: query_expansion_item
        schema: src/contracts/common.ts#QueryExpansionItemSchema
        envelope: src/contracts/common.ts#QueryExpansionItemEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#LlamaCpp.expandQuery
          - src/integrations/dspy.ts#optimizeQueryPrompt
          - src/dspy/policy-store.ts#DspyPolicyStore.expandQuery
        consumers:
          - src/store.ts#structuredSearch
          - src/store.ts#hybridQuery
    payload_refs:
      - unified_query_request

  graph_enhancement_bus:
    role: High-cost graph enrichment for selected corpus documents.
    invariant: GraphRAG consumes qmd corpus identity, not anonymous files.
    payloads:
      - name: graph_enhancement_request
        schema: src/contracts/graph-enhancement.ts#GraphEnhancementRequestSchema
        envelope: src/contracts/graph-enhancement.ts#GraphEnhancementRequestEnvelopeSchema
        storage: transient
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.buildGraphEnhancementRequest
        consumers:
          - src/integrations/graphrag.ts#runGraphRagIndex
          - python/qmd_graphrag/bridge.py#_run_graphrag_index
      - name: graph_enhancement_state
        schema: src/contracts/graph-enhancement.ts#GraphEnhancementStateSchema
        envelope: src/contracts/graph-enhancement.ts#GraphEnhancementStateEnvelopeSchema
        storage: graph_vault/books/<book_id>/job.yaml plus checkpoints and artifacts
        producers:
          - src/job-state/repository.ts#FileBookJobStateRepository.getGraphEnhancementState
        consumers:
          - src/graphrag/capability-catalog.ts#loadGraphCapabilities
      - name: graph_capability
        schema: src/contracts/graph-enhancement.ts#GraphCapabilitySchema
        envelope: src/contracts/graph-enhancement.ts#GraphCapabilityEnvelopeSchema
        storage: graph_vault/catalog/graph-capabilities.yaml
        producers:
          - src/graphrag/capability-catalog.ts#recordGraphCapability
          - src/graphrag/capability-catalog.ts#loadGraphCapabilities
        consumers:
          - src/query/unified-router.ts#decideRoute
          - src/cli/qmd.ts#graphRagQuerySearch
          - src/vault/restore.ts#restoreFromVault
      - name: graph_capability_catalog
        schema: src/contracts/graph-enhancement.ts#GraphCapabilityCatalogSchema
        envelope: src/contracts/graph-enhancement.ts#GraphCapabilityCatalogEnvelopeSchema
        storage: graph_vault/catalog/graph-capabilities.yaml
        producers:
          - src/graphrag/capability-catalog.ts#recordGraphCapability
        consumers:
          - src/graphrag/capability-catalog.ts#loadGraphCapabilities
          - src/vault/restore.ts#restoreFromVault
      - name: graphrag_index_request
        schema: src/contracts/graphrag.ts#GraphRagIndexRequestSchema
        envelope: src/contracts/graphrag.ts#GraphRagIndexEnvelopeSchema
        storage: transient
        producers:
          - scripts/graphrag/resume-book-workspace.mjs#run
        consumers:
          - src/integrations/graphrag.ts#runGraphRagIndex
          - python/qmd_graphrag/bridge.py#_run_graphrag_index
        scope_contract: >-
          indexScope carries the current book/source/document/content identity
          for provider cost lineage. Index accounting must not aggregate
          artifactIds from unrelated graph_vault capabilities.
      - name: graphrag_index_response
        schema: src/contracts/graphrag.ts#GraphRagIndexResponseSchema
        envelope: src/contracts/graphrag.ts#GraphRagIndexResponseEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/bridge.py#_run_graphrag_index
        consumers:
          - src/integrations/graphrag.ts#runGraphRagIndex
      - name: graphrag_query_request
        schema: src/contracts/graphrag.ts#GraphRagQueryRequestSchema
        envelope: src/contracts/graphrag.ts#GraphRagQueryEnvelopeSchema
        storage: transient
        producers:
          - src/cli/qmd.ts#graphRagQuerySearch
          - src/mcp/server.ts#createMcpServer
        consumers:
          - src/integrations/graphrag.ts#runGraphRagQuery
          - python/qmd_graphrag/bridge.py#_run_graphrag_query
      - name: graphrag_query_response
        schema: src/contracts/graphrag.ts#GraphRagQueryResponseSchema
        envelope: src/contracts/graphrag.ts#GraphRagQueryResponseEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/bridge.py#_run_graphrag_query
        consumers:
          - src/cli/qmd.ts#graphRagQuerySearch
          - src/integrations/graphrag.ts#runGraphRagQuery
          - src/query/unified-answer.ts#buildUnifiedAnswer
      - name: graphrag_provider_detail
        schema: src/contracts/graphrag.ts#GraphRagProviderDetailSchema
        envelope: src/contracts/graphrag.ts#GraphRagProviderDetailEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/bridge.py#_run_graphrag_query
        consumers:
          - src/query/unified-answer.ts#buildUnifiedAnswer
      - name: graphrag_evidence
        schema: src/contracts/graphrag.ts#GraphRagEvidenceSchema
        envelope: src/contracts/graphrag.ts#GraphRagEvidenceEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/bridge.py#_run_graphrag_query
        consumers:
          - src/query/unified-answer.ts#buildEvidenceRefsFromGraphRagResponse
          - src/integrations/graphrag.ts#evidenceCostLineage
        required_lineage_fields:
          - graphCapabilityId
          - sourceId
          - documentId
          - bookId
          - contentHash
          - graphTextUnitId
          - artifactId

  unified_answer_bus:
    role: User-facing typed query route and answer surface.
    invariant: All user-visible evidence is expressed as EvidenceRef.
    payloads:
      - name: unified_query_request
        schema: src/contracts/unified-query.ts#UnifiedQueryRequestSchema
        envelope: src/contracts/unified-query.ts#UnifiedQueryRequestEnvelopeSchema
        storage: transient
        producers:
          - src/cli/qmd.ts#querySearch
          - src/mcp/server.ts#createMcpServer
        consumers:
          - src/query/unified-router.ts#routeQuery
      - name: query_route_decision
        schema: src/contracts/unified-query.ts#QueryRouteDecisionSchema
        envelope: src/contracts/unified-query.ts#QueryRouteDecisionEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-router.ts#decideRoute
        consumers:
          - src/query/unified-answer.ts#buildUnifiedAnswer
          - src/cli/qmd.ts#querySearch
          - src/cli/qmd.ts#autoQuerySearch
          - src/cli/qmd.ts#graphRagQuerySearch
      - name: candidate_route_decision
        schema: src/contracts/unified-query.ts#CandidateRouteDecisionSchema
        envelope: src/contracts/unified-query.ts#CandidateRouteDecisionEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-router.ts#decideRoute
        consumers:
          - src/query/unified-answer.ts#buildUnifiedAnswer
          - src/cli/qmd.ts#querySearch
          - src/cli/qmd.ts#autoQuerySearch
          - src/cli/qmd.ts#graphRagQuerySearch
      - name: evidence_ref
        schema: src/contracts/unified-query.ts#EvidenceRefSchema
        envelope: src/contracts/unified-query.ts#EvidenceRefEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-answer.ts#buildEvidenceRefsFromQmdResults
          - src/query/unified-answer.ts#buildEvidenceRefsFromGraphRagResponse
        consumers:
          - src/query/unified-answer.ts#buildUnifiedAnswer
          - src/cli/qmd.ts#querySearch
          - src/cli/qmd.ts#autoQuerySearch
          - src/cli/qmd.ts#graphRagQuerySearch
          - src/mcp/server.ts#createMcpServer
        lineage_note: >-
          graphCapabilityId is null for qmd evidence and populated for
          GraphRAG evidence.
      - name: unified_answer
        schema: src/contracts/unified-query.ts#UnifiedAnswerSchema
        envelope: src/contracts/unified-query.ts#UnifiedAnswerEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-answer.ts#buildUnifiedAnswer
        consumers:
          - src/cli/qmd.ts#querySearch
          - src/cli/qmd.ts#autoQuerySearch
          - src/cli/qmd.ts#graphRagQuerySearch
          - src/mcp/server.ts#createMcpServer
      - name: graph_capability_error
        schema: src/contracts/unified-query.ts#GraphCapabilityErrorSchema
        envelope: src/contracts/unified-query.ts#GraphCapabilityErrorEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-router.ts#buildGraphCapabilityError
        consumers:
          - src/query/unified-router.ts#routeQuery
          - src/cli/qmd.ts#exitWithError
          - src/mcp/server.ts#createMcpServer
        public_output_rule: >-
          CLI and MCP expose TypedQueryError as the public top-level error.
          GraphCapabilityError is embedded in
          TypedQueryError.graphCapabilityError for missing graph_query
          capability.
      - name: typed_query_error
        schema: src/contracts/unified-query.ts#TypedQueryErrorSchema
        envelope: src/contracts/unified-query.ts#TypedQueryErrorEnvelopeSchema
        storage: transient_or_query_log
        producers:
          - src/query/unified-router.ts#routeQuery
        consumers:
          - src/cli/qmd.ts#exitWithError
          - src/mcp/server.ts#createMcpServer

  provider_bus:
    role: Typed provider boundary for OpenAI Responses API and Jina services.
    payloads:
      - name: openai_responses_provider_config
        schema: src/contracts/provider.ts#OpenAIResponsesProviderConfigSchema
        envelope: src/contracts/provider.ts#OpenAIResponsesProviderConfigEnvelopeSchema
        storage: transient_projection_from_.qmd/index.yml
        producers:
          - src/cli/qmd.ts#ensureRuntimeConfigForCli
          - src/cli/qmd.ts#openAIResponsesProviderConfigForCli
          - src/graphrag/settings-projection.ts#buildGraphRagRuntimeSettingsProjection
        consumers:
          - src/cli/qmd.ts#ensureRuntimeConfigForCli
          - src/cli/qmd.ts#dspyOptimizeQueryPrompt
          - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
          - finetune/experiments/gepa/responses_lm.py#OpenAIResponsesDspyLM
          - python/qmd_graphrag/graphrag_responses_completion.py#OpenAIResponsesCompletion
        notes:
          - .qmd/index.yml stores providers.openai plus models.generate;
            the provider config schema is a typed projection, not the raw YAML
            subtree.
          - apiKeyEnv and baseUrlEnv use EnvVarNameSchema.
      - name: openai_responses_request
        schema: src/contracts/provider.ts#OpenAIResponsesRequestSchema
        envelope: src/contracts/provider.ts#OpenAIResponsesRequestEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_base_completion
        consumers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_base_completion
        notes:
          - external endpoint is OpenAI Responses API POST /responses
      - name: openai_responses_response
        schema: src/contracts/provider.ts#OpenAIResponsesResponseSchema
        envelope: src/contracts/provider.ts#OpenAIResponsesResponseEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_collect_response_stream
        consumers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_collect_response_stream
        notes:
          - external endpoint is OpenAI Responses API POST /responses
      - name: openai_responses_stream_event
        schema: src/contracts/provider.ts#OpenAIResponsesStreamEventSchema
        envelope: src/contracts/provider.ts#OpenAIResponsesStreamEventEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_collect_response_stream
        consumers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_iter_response_chunks
      - name: openai_structured_output_schema
        schema: src/contracts/provider.ts#OpenAIStructuredOutputSchemaSchema
        envelope: src/contracts/provider.ts#OpenAIStructuredOutputSchemaEnvelopeSchema
        storage: transient
        producers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_build_response_text_config
        consumers:
          - python/qmd_graphrag/graphrag_responses_completion.py#_base_completion
        notes:
          - external consumer is OpenAI Responses API text.format.schema
      - name: jina_provider_config
        schema: src/contracts/jina.ts#JinaProviderConfigSchema
        envelope: src/contracts/jina.ts#JinaProviderConfigEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#resolveJinaApiBase
          - src/llm.ts#resolveJinaApiKey
        consumers:
          - src/llm.ts#LlamaCpp.embedBatchWithJina
          - src/llm.ts#LlamaCpp.rerankWithJina
      - name: jina_embedding_request
        schema: src/contracts/jina.ts#JinaEmbeddingRequestSchema
        envelope: src/contracts/jina.ts#JinaEmbeddingRequestEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#LlamaCpp.embedBatchWithJina
        consumers:
          - src/llm.ts#LlamaCpp.embedBatchWithJina
        notes:
          - external endpoint is Jina API POST /v1/embeddings
      - name: jina_embedding_response
        schema: src/contracts/jina.ts#JinaEmbeddingResponseSchema
        envelope: src/contracts/jina.ts#JinaEmbeddingResponseEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#LlamaCpp.embedBatchWithJina
        consumers:
          - src/llm.ts#LlamaCpp.embedBatchWithJina
          - src/store.ts#insertEmbedding
        notes:
          - external endpoint is Jina API POST /v1/embeddings
      - name: jina_rerank_request
        schema: src/contracts/jina.ts#JinaRerankRequestSchema
        envelope: src/contracts/jina.ts#JinaRerankRequestEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#LlamaCpp.rerankWithJina
        consumers:
          - src/llm.ts#LlamaCpp.rerankWithJina
        notes:
          - external endpoint is Jina API POST /v1/rerank
      - name: jina_rerank_response
        schema: src/contracts/jina.ts#JinaRerankResponseSchema
        envelope: src/contracts/jina.ts#JinaRerankResponseEnvelopeSchema
        storage: transient
        producers:
          - src/llm.ts#LlamaCpp.rerankWithJina
        consumers:
          - src/llm.ts#LlamaCpp.rerankWithJina
          - src/store.ts#rerank
        notes:
          - external endpoint is Jina API POST /v1/rerank
      - name: provider_request_fingerprint
        schema: src/contracts/provider.ts#ProviderRequestFingerprintSchema
        envelope: src/contracts/provider.ts#ProviderRequestFingerprintEnvelopeSchema
        storage: graph_vault/catalog/provider-requests/<artifact_id>.json
        producers:
          - src/llm.ts#LlamaCpp.recordProviderCost
          - src/integrations/graphrag.ts#writeGraphRagProviderRequestArtifact
        consumers:
          - src/integrations/graphrag.ts#recordGraphRagCost
