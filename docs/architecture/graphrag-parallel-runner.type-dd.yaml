        releaseOn: [commit, error, cancellation, lease_loss, timeout]
        durableWriteMode: jsonl_read_reconcile_replace
        checksumPolicy: none_for_current_jsonl_replace
        auxiliarySidecars: inherit_primary_mapping
        sidecarPolicy: >
          provider cost accounting 使用 durable opaque/replace 写入 JSONL
          ledger，以 temp file、owner sidecar、atomic rename 与 parent directory
          fsync 提交；本设计不因该 JSONL target 生成 checksum sidecar。其
          `{target}.tmp-*`、`{target}.tmp-*.owner.json`、`{target}.corrupt-*`
          与 parent directory fsync 必须继承 providerCostAccounting 的
          eventWriterLane mapping，不得触发 durable_target_mapping_missing。
      - target: graph_vault/dspy/**/*.yaml
        lane: catalogWriterLane
