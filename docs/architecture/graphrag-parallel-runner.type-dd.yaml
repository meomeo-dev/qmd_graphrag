schemaVersion: "1.0.0"
title: GraphRAG 多书并行 Runner 生产设计
status: production_ready_design
owner: qmd_graphrag
lastReviewed: "2026-05-29"

purpose: >
  在一个 batch run 内安全并行处理多本 EPUB 图书，提升 OpenAI、Jina 与本地
  qmd 资源利用率，同时保持每本书的 qmd 与 GraphRAG 构建闭环、状态可观测、
  失败可恢复、共享资源无竞争写入。

scope:
  included:
    - batch-epub-workflow 单进程协调器内部的多 worker 并行调度。
    - 每本书独立执行 EPUB 归一化、qmd 建库、GraphRAG 构建、query-ready
      门控与全部验证子命令。
    - graph_vault 下 book-scoped GraphRAG 产物隔离。
    - catalog、events、manifest、checkpoint 与 .qmd/index.sqlite 的并发安全写入。
    - OpenAI、Jina 与本地资源的全局并发限流。
    - provider 抖动、worker 崩溃、进程中断后的状态恢复与重入。
  excluded:
    - 多个独立 OS 级 batch-epub-workflow 进程写入同一个 runId。
    - 多台机器共同写入同一个 stateRoot。
    - 多本书共享同一个 graph_vault/output 作为 GraphRAG 工作输出目录。
    - 绕过 qmd 或 GraphRAG 真实构建的模拟完成状态。

productionContract:
  runnerTopology:
    coordinator:
      processCountPerRunId: 1
      responsibility: >
        唯一协调 item claim、worker 生命周期、全局限流、共享写入通道、
        run manifest 派生、停止策略与恢复策略。
    workers:
      model: in_process_async_workers
      configuredBy: "--book-concurrency"
      defaultConcurrency: 2
      minimumConcurrency: 1
      maximumConcurrencyPolicy: >
        不得超过 provider 限流、CPU、内存、磁盘 I/O 与 SQLite 写锁容量的
        保守上限。生产默认保持 2，扩大前必须通过真实批处理观测确认。
      responsibility: >
        每个 worker 一次只处理一本书，并在该书内按固定顺序完成 qmd、
        GraphRAG 与验证子命令闭环。
  unsupportedTopology:
    - 同一个 runId 启动多个 batch-epub-workflow 写入器。
    - 不经 coordinator 直接修改 item checkpoint、catalog 或 qmd index。
    - worker 持有过期 lease 后继续写入任何持久状态。
  runLock:
    path: graph_vault/catalog/batch-runs/{runId}/coordinator-lock.json
    acquirePrimitive: >
      使用同目录临时文件写入、fsync、原子 rename 与 generation compare-and-swap。
      acquire 只能在 lock 缺失、lock 已过期且记录的 coordinator pid 不存活，
      或显式 resume takeover 验证通过后成功。
    heartbeatPrimitive: >
      heartbeat 必须带 current generation 与 runnerSessionId。generation 不匹配
      时续租失败，旧 coordinator 必须停止 claim 和持久写入。
    takeoverGuard: >
      接管前必须扫描 durable subprocess registry。若旧 coordinator 或其记录的
      子进程组仍存活且无法终止，恢复流程必须停在 stop_until_fixed，
      不能启动新 writer。

hardInvariants:
  - id: single_coordinator_per_run
    rule: 同一个 runId 同时只能存在一个有效 coordinator。
    enforcement:
      - run lock 记录 runnerSessionId、pid、startedAt、heartbeatAt、expiresAt。
      - 新 coordinator 启动时必须拒绝未过期锁，或接管已过期且无
        活进程的锁。
      - coordinator 心跳停止后，只能通过恢复流程重建运行状态。
  - id: one_item_one_worker
    rule: 同一个 itemId 同时只能被一个 worker 持有。
    enforcement:
      - item lease 必须包含 runnerSessionId、workerId、fencingToken、
        heartbeatAt 与 expiresAt。
      - claim 操作必须是原子 compare-and-swap。
      - 每次 checkpoint、event、catalog、manifest、qmd index 与 book-scoped
        artifact 提交前必须验证 fencingToken 仍然有效。
  - id: one_book_one_writer
    rule: 同一个 bookId 同时只能有一个 worker 写入 book-scoped 产物。
    enforcement:
      - book lease 独立于 item lease，且必须拥有等强度 schema。
      - book lease 必须包含 runId、bookId、itemId、runnerSessionId、workerId、
        fencingToken、producerScope、heartbeatAt、expiresAt 与 generation。
      - book lease claim、heartbeat、expiry takeover 必须使用原子
        compare-and-swap。
      - 所有 book-scoped artifact、producer run record、graph capability 与
        book checkpoint 写入前必须验证 book fencingToken。
      - itemId 不同但解析到相同 bookId 时，后到 worker 必须等待、跳过或
        重新排队，不能并发写入。
  - id: graph_artifact_isolation
    rule: 每本书必须拥有独立 GraphRAG 工作目录、输出目录与报告目录。
    enforcement:
      - GraphRAG stage runId 必须包含 stage、timestamp 与唯一后缀。
      - query_ready 只能引用同一 bookId 下已完成的 graph_extract、
        community_report 与 embed producer run。
      - 禁止把 graph_vault/output 作为跨书共享生产输出目录。
  - id: serialized_global_writes
    rule: 全局状态写入必须串行化。
    enforcement:
      - catalogWriterLane 保护 graph_vault/catalog 下共享索引。
      - qmdIndexWriterLane 保护 .qmd/index.sqlite 与 qmd corpus 写入。
      - eventWriterLane 保护 events.jsonl 原子追加。
      - manifestWriterLane 只写派生后的 manifest，不维护未同步内存计数。
      - writer lane 默认不得嵌套持有。确需嵌套时必须按 qmdIndexWriterLane、
        catalogWriterLane、checkpointWriterLane、eventWriterLane、
        manifestWriterLane 的总顺序获取，并带 timeout 与 release-on-error。
  - id: derived_run_manifest
    rule: run 级统计必须从 item checkpoint 与事件派生。
    enforcement:
      - completed、pending、running、failed、skipped 不以 worker 内存变量为权威。
      - coordinator 定期扫描 checkpoint 重建 manifest。
      - 进程恢复后 manifest 必须可由磁盘状态完整重算。
  - id: real_build_by_default
    rule: 默认批处理必须真实执行完整 qmd 与 GraphRAG。
    enforcement:
      - 已完成状态必须有 qmd 验证子命令通过记录。
      - GraphRAG completed 必须通过 stage gate、producer lineage 与 query_ready
        能力投影验证。
      - 除显式 repair-only 或 status-only 命令外，不允许把缺失产物标记为完成。

resourceControls:
  providerSemaphores:
    subprocessEnforcement:
      model: coordinator_granted_provider_slots
      contract: >
        GraphRAG 与 qmd 子进程不得自行绕过全局 provider semaphore。worker 在启动
        任何可能调用 provider 的子进程前，必须向 coordinator 申请 provider
        slot lease，并把 slot id、provider、limit generation 与 redacted
        diagnostic env 传入子进程。
      subprocessModes:
        - mode: process_level_slot
          useWhen: >
            子进程无法逐请求回调 coordinator 时使用。一个 GraphRAG/qmd provider
            子进程占用对应 provider slot 直到进程退出或被取消。
        - mode: request_level_proxy
          useWhen: >
            provider adapter 可配置本地 proxy 或 IPC gate 时使用。每个真实 API
            request 进入 proxy 前申请 slot，完成、失败或超时后释放。
      enforcementRules:
        - 未获得 slot lease 的 provider 子进程不得启动。
        - slot lease 必须包含 provider、workerId、itemId、bookId、commandId、
          expiresAt、fencingToken 与 release event。
        - 子进程退出、被 kill、超时或 worker lease 丢失时必须释放 provider slot。
        - 恢复时发现 slot lease 无活进程，coordinator 必须回收 slot 并记录事件。
        - status-json 必须展示 activeProviderSlots、providerWaitMs 与
          providerSlotGeneration。
    openai:
      protects:
        - GraphRAG extract_graph LLM calls
        - GraphRAG create_community_reports LLM calls
        - qmd query commands using OpenAI-compatible providers
      configuredBy:
        - "--openai-provider-concurrency"
        - "QMD_OPENAI_PROVIDER_CONCURRENCY"
      defaultLimit: 1
      requiredBehavior: >
        所有 worker 的 OpenAI 请求必须共享同一个 semaphore。429、5xx、timeout、
        Responses output none 与网络中断必须进入统一 retry/recovery 分类。
      childProcessBoundary: >
        对 GraphRAG LLM 子进程，默认使用 process_level_slot。若未来 adapter
        支持 request_level_proxy，必须保留同一 status/event 证据字段。
    jina:
      protects:
        - GraphRAG embedding calls
        - qmd embedding or rerank calls using Jina
      configuredBy:
        - "--jina-provider-concurrency"
        - "QMD_JINA_PROVIDER_CONCURRENCY"
      defaultLimit: 2
      requiredBehavior: >
        所有 worker 的 Jina 请求必须共享同一个 semaphore。单本书不得独占全部
        Jina 容量，worker 调度必须允许其他书在 OpenAI 等待期间推进。
      childProcessBoundary: >
        对 GraphRAG embedding 与 qmd embedding 子进程，默认使用
        process_level_slot；若命令支持分片执行，coordinator 可把单书 embedding
        切成多个 bounded chunk，但仍必须由 slot lease 控制真实请求并发。
    localCpu:
      protects:
        - EPUB extraction and normalization
        - parquet validation
        - LanceDB and local file scans
      configuredBy:
        - "--local-cpu-concurrency"
        - "QMD_LOCAL_CPU_CONCURRENCY"
      defaultLimit: 2
  writerLanes:
    catalogWriterLane:
      capacity: 1
      protects:
        - graph_vault/catalog/books.yaml
        - graph_vault/catalog/runs.yaml
        - graph_vault/catalog/document-identity-map.yaml
        - graph_vault/catalog/graph-capabilities.yaml
    qmdIndexWriterLane:
      capacity: 1
      protects:
        - .qmd/index.sqlite
        - qmd book registration
        - qmd embedding writes
        - qmd cleanup writes
    eventWriterLane:
      capacity: 1
      protects:
        - graph_vault/catalog/batch-runs/**/events.jsonl
    checkpointWriterLane:
      capacity: 1
      protects:
        - graph_vault/books/**/job.yaml
        - graph_vault/books/**/artifacts.yaml
        - graph_vault/books/**/checkpoints.yaml
        - graph_vault/books/**/runs/*.yaml
        - graph_vault/catalog/batch-runs/**/book-leases/*.json
        - item checkpoint files under batch run state
    manifestWriterLane:
      capacity: 1
      protects:
        - graph_vault/catalog/batch-runs/**/coordinator-lock.json
        - graph_vault/catalog/batch-runs/**/provider-slots/*.json
        - graph_vault/catalog/batch-runs/**/subprocesses/*.json
        - graph_vault/catalog/batch-runs/**/manifest.json
        - graph_vault/catalog/batch-runs/**/status.json
        - durable checksum sidecars for all files protected by this lane
    targetMappingContract:
      rule: >
        每个生产持久化目标必须能从 targetMapping 追溯到唯一 lane、owner、
        durableKind、laneTimeoutMs 与 releaseOn。未列入 targetMapping 的
        durable YAML/JSON/JSONL/SQLite primary target 不得由并行 runner 写入。
        durable engine 为已登记 primary target 生成的 temp、owner、lock、
        checksum、checksum meta 与 corrupt quarantine 辅助路径必须先归一回
        primary target，再继承 primary mapping；不得被当作新的 primary target。
      defaultLaneTimeoutMs: 120000
      defaultReleaseOn:
        - commit
        - error
        - cancellation
        - lease_loss
        - timeout
      timeoutFailureEvent: writer_lane_timeout
      releaseRule: >
        lane 必须在 finally 中释放。timeout、取消、lease loss 或 durable write
        失败时，释放前必须保留 targetLocator、lane、owner、operationId 与
        fencingTokenHash 诊断证据。
      preflightScopeRule: >
        每个 targetMapping 条目必须能派生 preflight scan root。精确文件条目
        使用父目录；含 {bookId} 的条目使用当前 bookId 实例化；含通配或深层
        pattern 的条目必须声明 recursive scope。beforeClaim、beforeResumeBook
        与 runner_start 不得维护独立的手写 durable 目录清单。runner_start
        必须按 target family 的 startupCriticality 选择扫描模式，并对已发现
        batch items 展开 item-derived bookId scope；runner_start 不得跳过
        critical target 的 temp 扫描。historical_observation target 不得因出现在
        targetMapping 中自动升级为 runner_start 阻断性写入 preflight。
      derivedSidecarRule: >
        每个采用 checksum policy 的 durable primary target 隐式拥有 checksum
        sidecar `{target}.sha256` 与 checksum meta sidecar
        `{target}.sha256.meta.json`。sidecar 继承 primary target 的 lane、owner、
        laneTimeoutMs、releaseOn、durableMode 与 preflight scope；sidecar 不得
        作为新的 primary target 递归生成 `.sha256.meta.json.sha256`。sidecar
        failure evidence 必须同时包含 primaryTargetLocator、
        sidecarTargetLocator 与 sidecarKind。当前 YAML/JSON durable replace
        必须采用 checksum policy；JSONL target 只有在其 targetMapping 或
        durable write mode 明确声明 checksum policy 时才生成 checksum sidecar。
      auxiliarySidecarMappingRule: >
        每个 production durable primary target，包括 YAML、JSON、JSONL 与
        SQLite lock family，在使用 durable write protocol 时隐式拥有该协议生成
        的辅助 durable paths。至少包括 `{target}.tmp-*`、
        `{target}.tmp-*.owner.json`、`{target}.lock`、`{target}.corrupt-*`，
        以及启用 checksum policy 时的 `{target}.sha256`、
        `{target}.sha256.tmp-*`、`{target}.sha256.tmp-*.owner.json`、
        `{target}.sha256.meta.json` 与
        `{target}.sha256.meta.json.tmp-*.owner.json`。这些辅助路径必须通过
        primary target locator 解析，并继承 primary 的 lane、owner、
        durableKind、laneTimeoutMs、releaseOn、durableMode 与 preflight scope。
        辅助路径不得拥有独立 targetMapping row，不得递归生成自己的 checksum、
        checksum meta 或 owner sidecar。failure evidence 在可见失败路径为辅助
        path 时必须包含 targetLocator、primaryTargetLocator、sidecarTargetLocator
        或 auxiliaryTargetLocator、sidecarKind 或 auxiliarySidecarKind、tempId
        when available、operationId、lane、targetMappingOwner、primaryDurableKind
        与 completedPublishRule。
      directoryFsyncRule: >
        parent directory fsync 是 primary 或 sidecar durable write 的派生提交
        步骤，不是独立业务 target。实现为 directory fsync 生成 evidence 时，
        必须先解析触发该 fsync 的 primaryTargetLocator 或 sidecarTargetLocator，
        并继承其 lane、owner、laneTimeoutMs、releaseOn 与 preflight scope。
        primary 或 sidecar 的 durable kind 必须写入 primaryDurableKind；
        目录操作自身的 kind 必须写入 directoryDurableKind: directory。
        若只能看到目录路径，必须按目录 scope 映射到唯一 durable target family；
        目录路径不得因缺少文件名而触发 durable_target_mapping_missing。若目录
        scope 无法唯一映射，恢复决策为 stop_until_fixed。
      directoryFsyncEvidence:
        requiredFields:
          - directoryTargetLocator
          - primaryTargetLocator or sidecarTargetLocator
          - sidecarKind when fsync follows sidecar write
          - lane
          - targetMappingOwner
          - directoryDurableKind
          - primaryDurableKind when primary or sidecar target is visible
          - operationId
          - fsyncTarget
          - fsyncPlatform
          - fsyncErrno when fsync fails
          - completedPublishRule
        readOnlyRule: >
          status-json read-only 不得执行目录 fsync，但它报告 checksum meta 缺失、
          checksum mismatch 或 unresolved temp/lock 时，诊断中的目录 scope 必须
          使用同一 directoryFsyncRule 推导 lane 与 owner。repair writer 与正常
          resume 使用同一映射规则执行真实 fsync。
        unavailableSentinelRule: >
          directory fsync unsupported、uncertain 或平台 API 未返回 errno 时，不得
          省略 fsyncErrno。实现必须写入显式 sentinel，例如 unsupported、
          unavailable、unknown 或 platform_no_errno，并在
          unavailableFieldSentinels 中列出 fsyncErrno。所有 event、checkpoint、
          command check、status-json 与 recovery summary 必须保留该 sentinel。
      directoryFsyncScopes:
        - scope: graph_vault
          lane: catalogWriterLane
          owner: settingsProjection
          directoryDurableKind: directory
        - scope: graph_vault/catalog
          lane: catalogWriterLane
          owner: repository
          directoryDurableKind: directory
        - scope: graph_vault/catalog/provider-requests
          lane: catalogWriterLane
          owner: providerRequestFingerprint
          directoryDurableKind: directory
          purpose: directory_fsync_mapping_only
          startupCriticality: historical_observation
        - scope: graph_vault/catalog/batch-runs/{runId}
          lane: manifestWriterLane
          owner: batchCoordinator
          directoryDurableKind: directory
        - scope: graph_vault/catalog/batch-runs/{runId}/items
          lane: checkpointWriterLane
          owner: batchCoordinator
          directoryDurableKind: directory
        - scope: graph_vault/catalog/batch-runs/{runId}/provider-slots
          lane: manifestWriterLane
          owner: batchCoordinator
          directoryDurableKind: directory
        - scope: graph_vault/catalog/batch-runs/{runId}/subprocesses
          lane: manifestWriterLane
          owner: batchCoordinator
          directoryDurableKind: directory
        - scope: graph_vault/catalog/batch-runs/{runId}/book-leases
          lane: checkpointWriterLane
          owner: batchCoordinator
          directoryDurableKind: directory
        - scope: graph_vault/books/{bookId}
          lane: checkpointWriterLane
          owner: repository
          directoryDurableKind: directory
        - scope: graph_vault/books/{bookId}/runs
          lane: checkpointWriterLane
          owner: repository
          directoryDurableKind: directory
        - scope: graph_vault/books/{bookId}/qmd
          lane: checkpointWriterLane
          owner: qmd
          directoryDurableKind: directory
        - scope: graph_vault/books/{bookId}/output
          lane: checkpointWriterLane
          owner: graphOutputProducer
          directoryDurableKind: directory
          recursion: >
            recursive family scope; includes output/lancedb/*.lance directory
            fsyncs for qmd_row_count.json and other production output sidecars.
        - scope: graph_vault/output/lancedb/*.lance
          lane: checkpointWriterLane
          owner: artifactValidation
          directoryDurableKind: directory
        - scope: graph_vault/dspy
          lane: catalogWriterLane
          owner: dspyPolicyStore
          directoryDurableKind: directory
          recursion: >
            recursive family scope; includes all descendant directories that
            hold registered DSPy YAML/JSON targets or their checksum sidecars.
        - scope: .qmd
          lane: qmdIndexWriterLane
          owner: qmd
          directoryDurableKind: directory
    targetMapping:
      - target: graph_vault/catalog/books.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/runs.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/sources.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/document-identity-map.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/graph-capabilities.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: capabilityCatalog
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/books/{bookId}/job.yaml
        lane: checkpointWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/books/{bookId}/artifacts.yaml
        lane: checkpointWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/books/{bookId}/checkpoints.yaml
        lane: checkpointWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/books/{bookId}/runs/{runId}.yaml
        lane: checkpointWriterLane
        durableKind: yaml
        owner: repository
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/settings.yaml
        lane: catalogWriterLane
        durableKind: yaml
        owner: settingsProjection
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/items/{itemId}.json
        lane: checkpointWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/manifest.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/events.jsonl
        lane: eventWriterLane
        durableKind: jsonl
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/status.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/recovery-summary.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/coordinator-lock.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/provider-slots/*.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/subprocesses/*.json
        lane: manifestWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/batch-runs/{runId}/book-leases/*.json
        lane: checkpointWriterLane
        durableKind: json
        owner: batchCoordinator
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
      - target: graph_vault/catalog/provider-requests/*.json
        lane: catalogWriterLane
        durableKind: json
        owner: providerRequestFingerprint
        laneTimeoutMs: 120000
        releaseOn: [commit, error, cancellation, lease_loss, timeout]
        targetFamily: provider_request_fingerprint
        criticality: historical_observation
        startupCriticality: non_blocking
        runnerStartPreflightMode: read_only_capped_diagnostic
        normalRunnerMutationPolicy: no_primary_quarantine
        writableRepairBoundary: explicit_repair_or_migrate_only
        retentionAuthority: cache_like_observation
      - target: graph_vault/catalog/cost-accounting.jsonl
        lane: eventWriterLane
