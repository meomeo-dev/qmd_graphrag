schemaVersion: "1.0.0"
title: GraphRAG 单本书热插拔包设计定稿
status: final
owner: qmd_graphrag
lastReviewed: "2026-06-02"

purpose: >
  定义单本书 qmd 与 GraphRAG 产物的独立分发、挂载与卸载边界，使一本
  book 可以通过复制或删除目录完成安装和移除，形成热插拔
  (hot-plug) 使用体验。

scope:
  included:
    - graph_vault/books/{bookId} 作为单本书包的权威根目录。
    - BOOK_MANIFEST.json 的身份、文件闭包、校验、兼容性与挂载语义。
    - qmd、GraphRAG、source、input、state 与 producer evidence 的书级封装。
    - catalog 与全局索引作为可重建投影，而非单本书包的权威状态。
    - 从当前 distribution_manifest.json 迁移到 BOOK_MANIFEST.json。
  excluded:
    - 跨机器共享同一 graph_vault 的同步协议。
    - 用户手工编辑 GraphRAG parquet、LanceDB 或 qmd SQLite 文件的支持。
    - provider 请求、provider 响应、密钥、日志 payload 的分发。
    - 对历史不完整 book 目录的自动删除策略。

