  purpose: >
    评估书-书架-library 层级 GraphRAG 设计是否脱离当前代码和已审计设计基础。 该文档区分
    already_supported、direct_extension、new_capability 和 risk_gap， 防止把待实现设计误读为现有能力。
  summary:
    conclusion: >
      当前层级设计以已实现的单书 hotplug package、包内 qmd index、包内
      GraphRAG output、catalog projection、GraphRAG 单书查询和 runner
      ledger 为基础，没有脱离既有领域模型。design-turn_011 和
      design-turn_012 将上层包权威根修订为
      graph_vault/bookshelves/{bookshelfId} 与 graph_vault/library/{libraryId}；
      implementation-turn_009 已完成该 package-root 迁移的主要可运行闭环。
      本 review 下方的 groundingMatrix 已更新为当前 package-root 实现状态。
      legacy catalog-only 记录仅保留在迁移诊断、typed error 和 catalog
      projection 语境中；当前状态以 implementationGrounding 和
      pipelineIoContract.currentImplementationStatus 为准。
    highestRisk: >
      设计最容易脱节的位置不是单书包输入，而是 upper-level builder 与
      CLI 查询 scope 的状态判定。当前实现已支持 package-root
      `--bookshelf-id`、`--library-id`、upper semantic unit index、
      BOOKSHELF_MANIFEST、LIBRARY_MANIFEST、CURRENT、PUBLISH_READY、
      package-local quality gate、legacy catalog-only migration typed error
      和无 catalog projection 的显式查询。implementation-turn_020 已补齐
      显式 `--upper-synthesis`、refresh-membership 和 repair 管理命令；
      仍不得把 build-time LLM-authored community report synthesis、自动调度
      repair 或增量 rebuild planner 误写成已完成。
    requiredImplementationPosture: >
      实现必须优先在独立 upper-index 模块中迁移 package-root 读写边界，
      复用现有 hotplug validator、catalog projection、qmd index 和 GraphRAG
      query contracts；不得把 bookshelf/library 逻辑塞入已经较长的 CLI
      主文件，也不得把 runner ledger 当作语义输入。
