        contentHash、community report 或 text_unit。该目标不在交互路径构建索引，
        不扫描全部单书 community_reports。显式 `--upper-deepening` 只在该
        upper query 已选 evidence 上按 fixed budget 调用单书 GraphRAG；
        默认 synthesisLlMCallCap 为 0，不调用未受限 LLM synthesis。显式
        `--upper-synthesis` 的 LLM call cap 为 1，且输入和输出 token 预算只能
        收窄 package-local fixedQueryBudget。输出标准 UnifiedAnswer 与 bounded
        timing。
  riskAssessment:
    - id: risk_upper_scope_assumed_existing
      severity: high
      statement: |
        如果实现者把 bookshelf/library 查询当成当前 CLI 已支持能力，会导致 文档与行为不一致。
      mitigation: >
        实现前新增 explicit CLI scope contract tests，确认缺少 upper index 时 返回 typed
        error，而不是回退到全库 qmd 或单书 GraphRAG。
    - id: risk_builder_without_artifact_contract
      severity: high
      statement: >
        书架/library builder 若先写算法后补 schema，容易出现 semantic_units、 semantic_edges 和
        evidence_map 难以验证的问题。
      mitigation: |
        先实现 manifest/schema validators 和 fixture，再实现 builder。
    - id: risk_catalog_ledger_confusion
      severity: medium
      statement: >
        graph_vault/catalog/batch-runs 是 runner ledger，当前确实存在并被 runner 使用；不能被层级索引当作语义或
        readiness 输入。
      mitigation: >
        保持 pipeline I/O 的 no_runner_ledger_as_semantic_input 不变量，并在 upper builder tests
        中加入 batch-runs 污染反例。
    - id: risk_llm_cluster_overreach
      severity: medium
      statement: |
        LLM 聚类如果直接发布 query-ready 书架，会破坏用户单书包处理和显式 成员权威。
      mitigation: |
        实现 membership_decisions 之前不实现 LLM 自动聚类；LLM 输出只能是 suggestion_only。
  implementationSequencing:
    phase0_existingFoundation:
      status: existing
      includes:
        - single-book hotplug package publication
        - package-local qmd index
        - package-local GraphRAG output validation
        - catalog book and capability projection
        - single-book GraphRAG query
        - timing and runtime metrics
    phase1_groundedMinimum:
      status: implemented_with_risk_after_implementation_turn_012
      includes:
        - bookshelf writes under graph_vault/bookshelves/{bookshelfId}
        - library writes under graph_vault/library/{libraryId}
        - package-root BOOKSHELF_MANIFEST, LIBRARY_MANIFEST, CURRENT and PUBLISH_READY
          validators
        - explicit upper package query without catalog projection
        - upper_package_migration_required typed error for legacy catalog-only artifacts
        - tests proving explicit upper package query survives deleted catalog projections
        - unsafe upper scope id rejection
        - library evidence bridge fail-closed for missing or unknown lower lineage
        - measured bookshelf/library upper query runtime metrics
        - failed/staging CLI fixture coverage for explicit bookshelf/library scopes
        - catalog projection generated from query-ready upper packages without
          making catalog an authority root
      remaining:
        - real external provider single-book --graph-book-id success validation
    phase2_bookshelfBuild:
      status: package_root_minimum_implemented
      includes:
        - materialized bookshelf builder
        - semantic_units, semantic_edges and evidence_map writers
        - bookshelf quality gate and fixed-budget simulation
        - catalog projection generated from query-ready bookshelf package
        - no LLM suggestion promotion without user acceptance record
        - explicit --upper-deepening controlled deepening into selected
          member books under maxBooksForDeepening
        - explicit --upper-synthesis over selected bookshelf semantic evidence
          with one bounded LLM call
      remaining:
        - build-time LLM-authored bookshelf community report synthesis
        - automatic scheduled repair and incremental rebuild planner
    phase3_libraryBuild:
      status: package_root_minimum_implemented
      includes:
        - library membership and partition planner
        - library upper index builder
        - library quality gate
        - fixed-budget library query
        - catalog projection generated from query-ready library package
        - bookshelf/library
          status/list/build/rebuild/refresh-membership/repair management
          commands over package roots
        - explicit --upper-deepening controlled deepening from selected
          library evidence into member books under maxBookshelves
        - explicit --upper-synthesis over selected library semantic evidence
          with one bounded LLM call
      remaining:
        - build-time LLM-authored library community report synthesis
        - automatic scheduled repair and incremental rebuild planner
  designAdjustment:
    required: true
    completed: true
    changes:
      - target: docs/architecture/graphrag-hierarchical-library-index.type-dd.yaml
