implementation:
  files:
    - scripts/graphrag/batch-epub-workflow.mjs
    - test/cli.test.ts
  summary:
    - >-
      Batch runner now treats unrecoverable provider auth failures as global
      stop-until-fixed conditions.
    - >-
      401 and 403 provider status codes are detected from checkpoint-level and
      failed command-check evidence.
    - >-
      invalid api key, invalid_api_key, unauthorized, forbidden, and
      authentication text also trigger provider auth fail-fast without using a
      broad auth substring.
    - >-
      Provider auth stop emits the generic
      batch_stopped_after_non_transient_failure event with
      metadata.stopReason=provider_auth and does not emit the data
      compatibility compatibility event.
    - >-
      Existing data compatibility stop behavior and compatibility event are
      preserved.
    - >-
      Regression tests cover both existing 401 failed checkpoint stop before
      processing and runtime 401 failure stop within the same runner before the
      next book starts.
verification:
  passed:
