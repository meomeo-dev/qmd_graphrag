version: 1

notes:
  - >-
    Current catalog is a transition-state bus. qmd native retrieval and
    GraphRAG query are typed separately today. The target whole-corpus qmd plus
    enhanced-subset GraphRAG design is documented in
    docs/architecture/unified-retrieval-plane.md and
    docs/architecture/unified-retrieval-plane.type-dd.yaml.

types:
  - name: query_expansion_item
    schema: src/contracts/common.ts#QueryExpansionItemSchema
    producers:
      - src/llm.ts#expandQuery
      - src/integrations/dspy.ts#optimizeQueryPrompt
    consumers:
      - src/store.ts#structuredSearch
      - src/store.ts#hybridQuery
    storage: transient

  - name: graphrag_query_request
    schema: src/contracts/graphrag.ts#GraphRagQueryRequestSchema
    producers:
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/integrations/graphrag.ts#runGraphRagQuery
      - src/runtime.ts#createQmdGraphRagRuntime
    consumers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    storage: transient

  - name: graphrag_query_response
    schema: src/contracts/graphrag.ts#GraphRagQueryResponseSchema
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    consumers:
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/integrations/graphrag.ts#runGraphRagQuery
      - future.mcp.graphrag.query
    storage: transient

  - name: graphrag_index_request
    schema: src/contracts/graphrag.ts#GraphRagIndexRequestSchema
    producers:
      - src/integrations/graphrag.ts#runGraphRagIndex
      - src/runtime.ts#createQmdGraphRagRuntime
    consumers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_index
    storage: transient
    notes:
      - supports `skipValidation` to bypass GraphRAG preflight model checks when
        the gateway cannot satisfy upstream connectivity validation semantics
      - supports typed workflow overrides so recovery can rerun only the failed
        GraphRAG workflow instead of replaying upstream high-cost stages

  - name: graphrag_index_response
    schema: src/contracts/graphrag.ts#GraphRagIndexResponseSchema
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_index
    consumers:
      - src/integrations/graphrag.ts#runGraphRagIndex
      - future.cli.graphrag.index
    storage: transient

  - name: dspy_query_prompt_optimization_request
    schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationRequestSchema
    producers:
      - src/integrations/dspy.ts#optimizeQueryPrompt
      - src/runtime.ts#createQmdGraphRagRuntime
    consumers:
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
    storage: transient

  - name: optimized_query_prompt_artifact
    schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationResponseSchema
    producers:
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
    consumers:
      - future.prompt_registry.query_expansion
      - future.eval.query_expansion
    storage: file

  - name: dspy_generated_expansion_record
    schema: src/contracts/dspy.ts#DspyGeneratedExpansionRecordSchema
    producers:
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
      - finetune/experiments/gepa/dspy_gepa.py
    consumers:
      - src/contracts/dspy.ts#DspyGeneratedExpansionRecordSchema
      - future.eval.query_expansion
      - future.prompt_registry.query_expansion
    storage: file
    notes:
      - emitted records are line-delimited JSON examples used to evaluate and
        promote optimized query expansion prompts

  - name: jina_rerank_request
    schema: src/contracts/jina.ts#JinaRerankRequestSchema
    producers:
      - src/llm.ts#LlamaCpp.rerankWithJina
    consumers:
      - Jina API#POST /v1/rerank
    storage: transient

  - name: jina_rerank_response
    schema: src/contracts/jina.ts#JinaRerankResponseSchema
    producers:
      - Jina API#POST /v1/rerank
    consumers:
      - src/llm.ts#LlamaCpp.rerankWithJina
      - src/store.ts#rerank
    storage: transient

  - name: book_job
    schema: src/contracts/book-job.ts#BookJobSchema
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
      - src/job-state/repository.ts#FileBookJobStateRepository.upsertBookJob
    consumers:
      - future.batch_runner.book_scheduler
      - future.cli.graphrag.book_status
      - future.mcp.graphrag.book_status
    storage: file

  - name: book_stage_checkpoint
    schema: src/contracts/book-job.ts#BookJobStageCheckpointSchema
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.startStage
      - src/job-state/repository.ts#FileBookJobStateRepository.completeStage
      - src/job-state/repository.ts#FileBookJobStateRepository.failStage
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - future.batch_runner.book_scheduler
    storage: file
    notes:
      - checkpoint success is valid only when required artifact manifests remain
        present and their paths are reachable

  - name: book_artifact_manifest
    schema: src/contracts/book-job.ts#BookArtifactManifestSchema
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.recordArtifacts
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - future.batch_runner.book_scheduler
      - future.cli.graphrag.book_status
      - future.query_router.book_workspace_locator
    storage: file
    notes:
      - artifact identity excludes `producerRunId` to avoid duplicate entries
        across bootstrap and resume synchronization

  - name: book_resume_plan
    schema: src/contracts/book-job.ts#BookResumePlanSchema
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
    consumers:
      - future.batch_runner.book_scheduler
      - future.cli.graphrag.resume
    storage: transient
    notes:
      - stage state reason may be `artifact_missing` when checkpoint metadata
        exists but required artifacts are missing from manifest or disk

buses:
  - name: online_retrieval_bus
    description: Typed request and response bus for GraphRAG query execution.
    payloads:
      - graphrag_query_request
      - graphrag_query_response

  - name: offline_prompt_optimization_bus
    description: Typed request and artifact bus for DSPy-based query prompt optimization.
    payloads:
      - dspy_query_prompt_optimization_request
      - optimized_query_prompt_artifact
      - dspy_generated_expansion_record

  - name: jina_rerank_bus
    description: Typed request and response bus for Jina API reranking.
    payloads:
      - jina_rerank_request
      - jina_rerank_response

  - name: book_processing_state_bus
    description: Typed persistence bus for per-book state, checkpoints, and artifacts.
    payloads:
      - book_job
      - book_stage_checkpoint
      - book_artifact_manifest
      - book_resume_plan

dependencies:
  - name: qmd
    purpose: local lexical, vector, and rerank retrieval backbone
    rationale: existing TypeScript retrieval core and CLI/MCP surface
    alternatives:
      - bespoke TypeScript retrieval stack
    exit_conditions:
      - if retrieval core is fully replaced by a new typed engine

  - name: GraphRAG
    purpose: graph extraction, community reports, local/global/drift query engine
    rationale: qmd does not contain graph-native indexing or graph query orchestration
    alternatives:
      - custom knowledge graph pipeline
      - another graph retrieval framework
    boundary: python sidecar bridge
    preferred_vector_store: LanceDB
    exit_conditions:
      - if equivalent graph indexing and query quality exists natively in TypeScript

  - name: DSPy
    purpose: prompt compilation and query expansion optimization
    rationale: optimize prompts offline instead of embedding prompt search in online runtime
    alternatives:
      - manual prompt tuning
      - custom evolutionary prompt optimizer
    boundary: offline optimizer bridge
    exit_conditions:
      - if query expansion prompt optimization is replaced by another typed optimizer

  - name: Jina
    purpose: embedding provider and rerank provider
    rationale: external high-quality embedding and rerank service
    alternatives:
      - OpenAI embeddings
      - Azure OpenAI embeddings
      - local embedding models
    boundary: >-
      GraphRAG embedding -> graphrag-llm -> LiteLLM; qmd rerank ->
      src/llm.ts#LlamaCpp.rerankWithJina -> Jina API
    required_env:
      - JINA_API_KEY
    exit_conditions:
      - if embedding quality, latency, or cost no longer fit the retrieval pipeline
