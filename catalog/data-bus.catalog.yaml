version: 1

notes:
  - >-
    This catalog is the authoritative typed data-bus contract inventory for
    qmd_graphrag. It defines required payloads, schemas, producers, consumers,
    and storage boundaries.
  - >-
    qmd owns the whole-corpus retrieval plane. GraphRAG owns the graph-enhanced
    subset. Shared payloads use schemas and declared producer/consumer
    boundaries.

types:
  - name: source_document
    schema: src/contracts/corpus.ts#SourceDocumentSchema
    envelope: src/contracts/corpus.ts#SourceDocumentEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
    consumers:
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/sources.yaml
    notes:
      - canonical identity derives from sourceHash
      - source path fields are locators and do not participate in identity

  - name: source_document_catalog
    schema: src/contracts/corpus.ts#SourceDocumentCatalogSchema
    envelope: src/contracts/corpus.ts#SourceDocumentCatalogEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
    consumers:
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/sources.yaml

  - name: corpus_document
    schema: src/contracts/corpus.ts#CorpusDocumentSchema
    envelope: src/contracts/corpus.ts#CorpusDocumentEnvelopeSchema
    contract_level: schema_declaration
    producers:
      - src/query/qmd-lineage.ts#projectQmdDocumentLineage
    consumers:
      - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
    storage: .qmd/index.sqlite
    notes:
      - qmd SQLite stores raw document rows; unified routing consumes
        qmd_retrieval_candidate projections, not raw corpus_document payloads
      - CorpusDocumentSchema declares the stable projection shape; it is not
        persisted as a standalone required bus payload

  - name: corpus_chunk
    schema: src/contracts/corpus.ts#CorpusChunkSchema
    envelope: src/contracts/corpus.ts#CorpusChunkEnvelopeSchema
    contract_level: schema_declaration
    producers:
      - src/query/qmd-lineage.ts#buildQmdChunkLineageId
    consumers:
      - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
    storage: .qmd/index.sqlite
    notes:
      - qmd chunk ids are projected into qmd_retrieval_candidate evidence
      - GraphRAG sync records chunkIds into document_identity_map when graph
        identity is available, but does not produce corpus_chunk rows

  - name: document_identity_map
    schema: src/contracts/corpus.ts#DocumentIdentityMapSchema
    envelope: src/contracts/corpus.ts#DocumentIdentityMapEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
      - src/job-state/repository.ts#FileBookJobStateRepository.recordDocumentChunks
      - src/job-state/repository.ts#FileBookJobStateRepository.recordQmdCorpusRegistration
      - src/job-state/repository.ts#FileBookJobStateRepository.recordGraphTextUnitIdentity
    consumers:
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
      - src/query/qmd-candidates.ts#loadDocumentIdentitiesFromGraphVault
      - src/job-state/repository.ts#FileBookJobStateRepository.validateQueryReadyGraphIdentity
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/document-identity-map.yaml
    notes:
      - stores normalizationPolicyVersion with contentHash lineage
      - qmdCorpusRegistered gates query_ready capability publication
      - persists graphDocumentId and graphTextUnitIds when GraphRAG output is
        available

  - name: document_identity_catalog
    schema: src/contracts/corpus.ts#DocumentIdentityCatalogSchema
    envelope: src/contracts/corpus.ts#DocumentIdentityCatalogEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
    consumers:
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/document-identity-map.yaml

  - name: graph_text_unit_identity_map
    schema: src/contracts/corpus.ts#GraphTextUnitIdentityMapSchema
    envelope: src/contracts/corpus.ts#GraphTextUnitIdentityMapEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.recordGraphTextUnitIdentity
      - python/qmd_graphrag/bridge.py#_filter_graphrag_frames_for_scope
    storage: graph_vault/catalog/document-identity-map.yaml
    notes:
      - binds sourceId, sourceHash, documentId, and contentHash to GraphRAG
        graphDocumentId and graphTextUnitIds
      - GraphRAG documents.parquet and text_units.parquet are source tables
        read by the producer; they are not Type DD bus producers

  - name: query_expansion_item
    schema: src/contracts/common.ts#QueryExpansionItemSchema
    envelope: src/contracts/common.ts#QueryExpansionItemEnvelopeSchema
    contract_level: required
    producers:
      - src/llm.ts#LlamaCpp.expandQuery
      - src/integrations/dspy.ts#optimizeQueryPrompt
    consumers:
      - src/store.ts#structuredSearch
      - src/store.ts#hybridQuery
    storage: transient

  - name: qmd_query_request
    schema: src/contracts/qmd-query.ts#QmdQueryRequestSchema
    envelope: src/contracts/qmd-query.ts#QmdQueryRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/cli/qmd.ts#querySearch
      - src/mcp/server.ts#createMcpServer
    consumers:
      - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
      - src/query/unified-router.ts#routeQuery
    storage: transient
    notes:
      - direct qmd whole-corpus retrieval intent contract
      - unified_query_request is the user-facing route contract for qmd,
        graphrag, and auto routes
      - qmd_retrieval_candidate is the downstream candidate contract consumed by
        the unified router

  - name: qmd_retrieval_candidate
    schema: src/contracts/qmd-query.ts#QmdRetrievalCandidateSchema
    envelope: src/contracts/qmd-query.ts#QmdRetrievalCandidateEnvelopeSchema
    contract_level: required
    producers:
      - src/query/qmd-candidates.ts#toQmdRetrievalCandidates
    consumers:
      - src/query/unified-router.ts#decideRoute
      - src/query/unified-answer.ts#buildUnifiedAnswer
    storage: transient

  - name: qmd_search_result
    schema: src/contracts/qmd-query.ts#QmdSearchResultSchema
    envelope: src/contracts/qmd-query.ts#QmdSearchResultEnvelopeSchema
    contract_level: required
    producers:
      - src/cli/qmd.ts#searchQmdForUnifiedRoute
      - src/mcp/server.ts#createMcpServer
    consumers:
      - src/cli/qmd.ts#querySearch
      - src/cli/qmd.ts#autoQuerySearch
      - src/query/unified-answer.ts#buildUnifiedAnswer
    storage: transient

  - name: graph_enhancement_request
    schema: src/contracts/graph-enhancement.ts#GraphEnhancementRequestSchema
    envelope: src/contracts/graph-enhancement.ts#GraphEnhancementRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.buildGraphEnhancementRequest
    consumers:
      - src/integrations/graphrag.ts#runGraphRagIndex
      - python/qmd_graphrag/bridge.py#_run_graphrag_index
    storage: transient
    notes:
      - normalizedInputPath is vault-relative and rejects absolute,
        traversal, and URI-like paths

  - name: graph_enhancement_state
    schema: src/contracts/graph-enhancement.ts#GraphEnhancementStateSchema
    envelope: src/contracts/graph-enhancement.ts#GraphEnhancementStateEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getGraphEnhancementState
    consumers:
      - test/book-job-state.test.ts#FileBookJobStateRepository graph enhancement state tests
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
    storage: graph_vault/books/<book_id>/job.yaml plus checkpoints and artifacts
    notes:
      - query-ready status is derived from validated checkpoint and validated manifest
      - this projection is for typed inspection and audit; runtime capability
        loading reads book state, checkpoints, artifacts, and identity catalogs

  - name: graph_capability
    schema: src/contracts/graph-enhancement.ts#GraphCapabilitySchema
    envelope: src/contracts/graph-enhancement.ts#GraphCapabilityEnvelopeSchema
    contract_level: required
    producers:
      - src/graphrag/capability-catalog.ts#recordGraphCapability
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
    consumers:
      - src/query/unified-router.ts#decideRoute
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/graph-capabilities.yaml
    notes:
      - rebuildable projection derived from validated checkpoint and manifest
      - explicit catalog is written by recordGraphCapability and can be
        rebuilt from query-ready book state
      - book-state derived capability is authoritative for matching
        bookId/kind/method

  - name: graph_capability_catalog
    schema: src/contracts/graph-enhancement.ts#GraphCapabilityCatalogSchema
    envelope: src/contracts/graph-enhancement.ts#GraphCapabilityCatalogEnvelopeSchema
    contract_level: required
    producers:
      - src/graphrag/capability-catalog.ts#recordGraphCapability
    consumers:
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/graph-capabilities.yaml
    notes:
      - catalog entries are accepted only when corresponding query-ready
        checkpoint artifact manifests validate
      - artifact stage remains producer stage and is not rewritten to
        query_ready
      - explicit catalog supplements absent capability semantic keys and does
        not overwrite derived book-state capabilities

  - name: graphrag_query_request
    schema: src/contracts/graphrag.ts#GraphRagQueryRequestSchema
    envelope: src/contracts/graphrag.ts#GraphRagQueryEnvelopeSchema
    contract_level: required
    producers:
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/mcp/server.ts#createMcpServer
    consumers:
      - src/integrations/graphrag.ts#runGraphRagQuery
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    storage: transient

  - name: graphrag_query_response
    schema: src/contracts/graphrag.ts#GraphRagQueryResponseSchema
    envelope: src/contracts/graphrag.ts#GraphRagQueryResponseEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    consumers:
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/integrations/graphrag.ts#runGraphRagQuery
      - src/query/unified-answer.ts#buildUnifiedAnswer
    storage: transient
    notes:
      - responseText is provider output and is not an evidence contract
      - GraphRAG evidence must be normalized into EvidenceRef before user output
      - providerDetail is typed provider metadata and is not an evidence contract

  - name: graphrag_provider_detail
    schema: src/contracts/graphrag.ts#GraphRagProviderDetailSchema
    envelope: src/contracts/graphrag.ts#GraphRagProviderDetailEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    consumers:
      - src/query/unified-answer.ts#buildUnifiedAnswer
    storage: transient
    notes:
      - carries provider and method only
      - raw provider context tables remain internal bridge state and do not
        cross the Type DD data bus

  - name: graphrag_evidence
    schema: src/contracts/graphrag.ts#GraphRagEvidenceSchema
    envelope: src/contracts/graphrag.ts#GraphRagEvidenceEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_query
    consumers:
      - src/query/unified-answer.ts#buildEvidenceRefsFromGraphRagResponse
      - src/integrations/graphrag.ts#evidenceCostLineage
    storage: transient
    notes:
      - carries graphCapabilityId as first-class lineage for GraphRAG evidence
      - required lineage includes bookId, graphTextUnitId, and artifactId

  - name: graphrag_index_request
    schema: src/contracts/graphrag.ts#GraphRagIndexRequestSchema
    envelope: src/contracts/graphrag.ts#GraphRagIndexEnvelopeSchema
    contract_level: required
    producers:
      - scripts/graphrag/resume-book-workspace.mjs
    consumers:
      - src/integrations/graphrag.ts#runGraphRagIndex
      - python/qmd_graphrag/bridge.py#_run_graphrag_index
    storage: transient
    notes:
      - supports `skipValidation` for gateways whose connectivity checks differ
        from GraphRAG upstream validation semantics
      - supports typed workflow overrides so recovery replays only the failed
        GraphRAG workflow
      - indexScope carries current book/source/document/content lineage for
        provider cost accounting and prevents full-vault capability aggregation

  - name: graphrag_index_response
    schema: src/contracts/graphrag.ts#GraphRagIndexResponseSchema
    envelope: src/contracts/graphrag.ts#GraphRagIndexResponseEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_graphrag_index
    consumers:
      - src/integrations/graphrag.ts#runGraphRagIndex
    storage: transient

  - name: unified_query_request
    schema: src/contracts/unified-query.ts#UnifiedQueryRequestSchema
    envelope: src/contracts/unified-query.ts#UnifiedQueryRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/cli/qmd.ts#querySearch
      - src/mcp/server.ts#createMcpServer
    consumers:
      - src/query/unified-router.ts#routeQuery
    storage: transient

  - name: query_route_decision
    schema: src/contracts/unified-query.ts#QueryRouteDecisionSchema
    envelope: src/contracts/unified-query.ts#QueryRouteDecisionEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-router.ts#decideRoute
    consumers:
      - src/query/unified-answer.ts#buildUnifiedAnswer
      - src/cli/qmd.ts#querySearch
      - src/cli/qmd.ts#autoQuerySearch
      - src/cli/qmd.ts#graphRagQuerySearch
    storage: transient_or_query_log
    notes:
      - records intent class, graph coverage, cost class, selected identities,
        graph capability ids, and refusal reasons
      - graphrag scope identity is derived from selected GraphCapability
        records rather than partial qmd candidate identity
      - explicit graphrag requests without capability keep selectedRoute
        graphrag and set status refused; they do not encode qmd fallback

  - name: candidate_route_decision
    schema: src/contracts/unified-query.ts#CandidateRouteDecisionSchema
    envelope: src/contracts/unified-query.ts#CandidateRouteDecisionEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-router.ts#decideRoute
    consumers:
      - src/query/unified-answer.ts#buildUnifiedAnswer
      - src/cli/qmd.ts#querySearch
      - src/cli/qmd.ts#autoQuerySearch
      - src/cli/qmd.ts#graphRagQuerySearch
    storage: transient_or_query_log
    notes:
      - records per-candidate graph readiness, scores, selection status,
        selection reason, and refusal reason

  - name: evidence_ref
    schema: src/contracts/unified-query.ts#EvidenceRefSchema
    envelope: src/contracts/unified-query.ts#EvidenceRefEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-answer.ts#buildEvidenceRefsFromQmdResults
      - src/query/unified-answer.ts#buildEvidenceRefsFromGraphRagResponse
    consumers:
      - src/query/unified-answer.ts#buildUnifiedAnswer
      - src/cli/qmd.ts#querySearch
      - src/cli/qmd.ts#autoQuerySearch
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/mcp/server.ts#createMcpServer
    storage: transient_or_query_log
    notes:
      - graphCapabilityId is null for qmd-only evidence and populated for
        GraphRAG evidence
      - resolves user-facing evidence to source, document, chunk, artifact, or
        GraphRAG text unit identity

  - name: unified_answer
    schema: src/contracts/unified-query.ts#UnifiedAnswerSchema
    envelope: src/contracts/unified-query.ts#UnifiedAnswerEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-answer.ts#buildUnifiedAnswer
    consumers:
      - src/cli/qmd.ts#querySearch
      - src/cli/qmd.ts#autoQuerySearch
      - src/cli/qmd.ts#graphRagQuerySearch
      - src/mcp/server.ts#createMcpServer
    storage: transient_or_query_log

  - name: typed_query_error
    schema: src/contracts/unified-query.ts#TypedQueryErrorSchema
    envelope: src/contracts/unified-query.ts#TypedQueryErrorEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-router.ts#routeQuery
    consumers:
      - src/cli/qmd.ts#exitWithError
      - src/mcp/server.ts#createMcpServer
    storage: transient_or_query_log
    notes:
      - carries schemaVersion, route, stage, provider, capability, code,
        retryable, and redactedMessage

  - name: graph_capability_error
    schema: src/contracts/unified-query.ts#GraphCapabilityErrorSchema
    envelope: src/contracts/unified-query.ts#GraphCapabilityErrorEnvelopeSchema
    contract_level: required
    producers:
      - src/query/unified-router.ts#buildGraphCapabilityError
    consumers:
      - src/query/unified-router.ts#routeQuery
      - src/cli/qmd.ts#exitWithError
      - src/mcp/server.ts#createMcpServer
    storage: transient_or_query_log
    notes:
      - domain error for missing graph_query capability
      - public CLI/MCP error output exposes TypedQueryError as the top-level
        error and embeds GraphCapabilityError for missing graph_query

  - name: openai_responses_provider_config
    schema: src/contracts/provider.ts#OpenAIResponsesProviderConfigSchema
    envelope: src/contracts/provider.ts#OpenAIResponsesProviderConfigEnvelopeSchema
    contract_level: required
    producers:
      - .qmd/index.yml#providers.openai
    consumers:
      - src/cli/qmd.ts#ensureRuntimeConfigForCli
      - python/qmd_graphrag/graphrag_responses_completion.py
    storage: .qmd/index.yml
    notes:
      - endpoint is `/responses`
      - stream mode is required
      - base URL is not force-prefixed with `/v1`
      - qmd project config owns env names and endpoint intent; GraphRAG runtime
        settings receive the projected provider values

  - name: openai_responses_request
    schema: src/contracts/provider.ts#OpenAIResponsesRequestSchema
    envelope: src/contracts/provider.ts#OpenAIResponsesRequestEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/graphrag_responses_completion.py
    consumers:
      - OpenAI Responses API#POST /responses
    storage: transient

  - name: openai_responses_response
    schema: src/contracts/provider.ts#OpenAIResponsesResponseSchema
    envelope: src/contracts/provider.ts#OpenAIResponsesResponseEnvelopeSchema
    contract_level: required
    producers:
      - OpenAI Responses API#POST /responses
    consumers:
      - python/qmd_graphrag/graphrag_responses_completion.py
    storage: transient

  - name: openai_responses_stream_event
    schema: src/contracts/provider.ts#OpenAIResponsesStreamEventSchema
    envelope: src/contracts/provider.ts#OpenAIResponsesStreamEventEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/graphrag_responses_completion.py
    consumers:
      - python/qmd_graphrag/graphrag_responses_completion.py
    storage: transient

  - name: openai_structured_output_schema
    schema: src/contracts/provider.ts#OpenAIStructuredOutputSchemaSchema
    envelope: src/contracts/provider.ts#OpenAIStructuredOutputSchemaEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/graphrag_responses_completion.py
    consumers:
      - OpenAI Responses API#text.format.schema
    storage: transient
    notes:
      - zod schema files validate payload shape and are not runtime producers
      - plain completion requests omit text.format and still require
        stream=true
      - every OpenAI Responses structured output JSON schema object node sets
        additionalProperties to false
      - Responses provider projection carries responses_endpoint=/responses,
        responses_stream=true, and strict_structured_output=true into
        GraphRAG runtime settings

  - name: jina_embedding_request
    schema: src/contracts/jina.ts#JinaEmbeddingRequestSchema
    envelope: src/contracts/jina.ts#JinaEmbeddingRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/llm.ts#LlamaCpp.embedBatchWithJina
    consumers:
      - Jina API#POST /v1/embeddings
    storage: transient

  - name: jina_provider_config
    schema: src/contracts/jina.ts#JinaProviderConfigSchema
    envelope: src/contracts/jina.ts#JinaProviderConfigEnvelopeSchema
    contract_level: required
    producers:
      - src/llm.ts#resolveJinaApiBase
      - src/llm.ts#resolveJinaApiKey
    consumers:
      - src/llm.ts#LlamaCpp.embedBatchWithJina
      - src/llm.ts#LlamaCpp.rerankWithJina
    storage: transient
    notes:
      - stores environment variable names and endpoints, never secret values

  - name: jina_embedding_response
    schema: src/contracts/jina.ts#JinaEmbeddingResponseSchema
    envelope: src/contracts/jina.ts#JinaEmbeddingResponseEnvelopeSchema
    contract_level: required
    producers:
      - Jina API#POST /v1/embeddings
    consumers:
      - src/llm.ts#LlamaCpp.embedBatchWithJina
      - src/store.ts#insertEmbedding
    storage: transient

  - name: dspy_query_prompt_optimization_request
    schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationRequestSchema
    envelope: src/contracts/dspy.ts#DspyOptimizationEnvelopeSchema
    contract_level: required
    producers:
      - src/integrations/dspy.ts#optimizeQueryPrompt
      - src/llm.ts#LlamaCpp.expandQuery
    consumers:
      - src/integrations/dspy.ts#optimizeQueryPrompt
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
    storage: transient
    notes:
      - request envelopes carry optimization inputs across the TypeScript to
        Python bridge boundary

  - name: optimized_query_prompt_artifact
    schema: src/contracts/dspy.ts#DspyQueryPromptOptimizationResponseSchema
    envelope: src/contracts/dspy.ts#DspyOptimizationResponseEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
    consumers:
      - finetune/experiments/gepa/dspy_gepa.py
    storage: file

  - name: dspy_generated_expansion_record
    schema: src/contracts/dspy.ts#DspyGeneratedExpansionRecordSchema
    envelope: src/contracts/dspy.ts#DspyGeneratedExpansionRecordEnvelopeSchema
    contract_level: required
    producers:
      - python/qmd_graphrag/bridge.py#_run_dspy_optimize_query_prompt
      - finetune/experiments/gepa/dspy_gepa.py
    consumers:
      - finetune/experiments/gepa/dspy_gepa.py
    storage: file
    notes:
      - emitted records are line-delimited JSON examples for optimized query
        expansion prompt evaluation and promotion

  - name: jina_rerank_request
    schema: src/contracts/jina.ts#JinaRerankRequestSchema
    envelope: src/contracts/jina.ts#JinaRerankRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/llm.ts#LlamaCpp.rerankWithJina
    consumers:
      - Jina API#POST /v1/rerank
    storage: transient

  - name: jina_rerank_response
    schema: src/contracts/jina.ts#JinaRerankResponseSchema
    envelope: src/contracts/jina.ts#JinaRerankResponseEnvelopeSchema
    contract_level: required
    producers:
      - Jina API#POST /v1/rerank
    consumers:
      - src/llm.ts#LlamaCpp.rerankWithJina
      - src/store.ts#rerank
    storage: transient

  - name: book_job
    schema: src/contracts/book-job.ts#BookJobSchema
    envelope: src/contracts/book-job.ts#BookJobEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.registerBookSource
      - src/job-state/repository.ts#FileBookJobStateRepository.upsertBookJob
    consumers:
      - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
    storage: file

  - name: book_job_catalog
    schema: src/contracts/book-job.ts#BookJobCatalogSchema
    envelope: src/contracts/book-job.ts#BookJobCatalogEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.upsertBookJob
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
    storage: graph_vault/catalog/books.yaml

  - name: book_stage_checkpoint
    schema: src/contracts/book-job.ts#BookJobStageCheckpointSchema
    envelope: src/contracts/book-job.ts#BookJobStageCheckpointEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.startStage
      - src/job-state/repository.ts#FileBookJobStateRepository.completeStage
      - src/job-state/repository.ts#FileBookJobStateRepository.failStage
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    storage: file
    notes:
      - checkpoint success is valid only when required artifact manifests remain
        present and their paths resolve from graph_vault

  - name: book_stage_checkpoint_list
    schema: src/contracts/book-job.ts#BookJobCheckpointListSchema
    envelope: src/contracts/book-job.ts#BookJobCheckpointListEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.startStage
      - src/job-state/repository.ts#FileBookJobStateRepository.completeStage
      - src/job-state/repository.ts#FileBookJobStateRepository.failStage
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
    storage: graph_vault/books/<book_id>/checkpoints.yaml

  - name: book_artifact_manifest
    schema: src/contracts/book-job.ts#BookArtifactManifestSchema
    envelope: src/contracts/book-job.ts#BookArtifactManifestEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.recordArtifacts
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
      - src/vault/restore.ts#restoreFromVault
    storage: file
    notes:
      - artifact identity excludes `producerRunId` to avoid duplicate entries
        across bootstrap and resume synchronization
      - stores artifact hash and normalization policy lineage when applicable
      - "`lancedb_index` artifact hash covers required table `data/*.lance`
        fragments and `qmd_row_count.json`; `_versions/**` and other
        vendor-volatile files do not participate in canonical hash"

  - name: book_artifact_manifest_list
    schema: src/contracts/book-job.ts#BookArtifactManifestListSchema
    envelope: src/contracts/book-job.ts#BookArtifactManifestListEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.recordArtifacts
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
      - src/graphrag/capability-catalog.ts#loadGraphCapabilities
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/books/<book_id>/artifacts.yaml

  - name: book_resume_plan
    schema: src/contracts/book-job.ts#BookResumePlanSchema
    envelope: src/contracts/book-job.ts#BookResumePlanEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.getResumePlan
    consumers:
      - src/job-state/graphrag-book.ts#syncGraphRagBookWorkspace
    storage: transient
    notes:
      - stage state reason may be `artifact_missing` when checkpoint metadata
        exists but required artifacts are missing from manifest or disk

  - name: book_run_catalog
    schema: src/contracts/book-job.ts#BookJobRunCatalogSchema
    envelope: src/contracts/book-job.ts#BookJobRunCatalogEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.appendRunRecord
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.listRunRecords
    storage: graph_vault/catalog/runs.yaml

  - name: book_run_record
    schema: src/contracts/book-job.ts#BookJobRunRecordSchema
    envelope: src/contracts/book-job.ts#BookJobRunRecordEnvelopeSchema
    contract_level: required
    producers:
      - src/job-state/repository.ts#FileBookJobStateRepository.appendRunRecord
    consumers:
      - src/job-state/repository.ts#FileBookJobStateRepository.listRunRecords
    storage: graph_vault/books/<book_id>/runs/<run_id>.yaml

  - name: provider_cost_accounting
    schema: src/contracts/provider.ts#ProviderCostAccountingSchema
    envelope: src/contracts/provider.ts#ProviderCostAccountingEnvelopeSchema
    contract_level: required
    producers:
      - src/integrations/graphrag.ts#runGraphRagIndex
      - src/integrations/graphrag.ts#runGraphRagQuery
      - src/llm.ts#LlamaCpp.embedBatchWithJina
      - src/llm.ts#LlamaCpp.rerankWithJina
    consumers:
      - src/provider/cost-accounting.ts#appendProviderCostAccounting
    storage: graph_vault/catalog/cost-accounting.jsonl
    notes:
      - records provider, model, run, token, embedding, cache, and artifact lineage
      - requestArtifactId is a first-class field and must be present in
        artifactIds
      - lineageMode declares whether the record is corpus_artifact,
        graph_artifact, multi_document_query, or transient_query
      - artifactIds must include the redacted provider request fingerprint
        artifact for GraphRAG, Jina embedding, and Jina rerank calls
      - tokenCountStatus and embeddingCountStatus distinguish reported,
        estimated, and unknown counts; unknown counts use numeric 0 only as an
        aggregation-neutral value
      - qmd Jina embedding and rerank records are request-level records; source
        and book identities are nullable for qmd-only corpus calls, while
        document and content identities are projected from qmd SQLite when the
        request is tied to corpus content
      - records without corpus identity are valid only with lineageMode
        transient_query
      - qmd Jina request-level records always reference a redacted provider
        request artifact under graph_vault/catalog/provider-requests
      - OpenAI Responses stream events are internal to the GraphRAG Python
        provider adapter; the cost ledger records GraphRAG index/query as
        aggregate adapter calls with provider `graphrag`
      - GraphRAG aggregate records carry redacted request fingerprints and
        business artifact lineage; they do not claim direct OpenAI token usage
        unless GraphRAG exposes provider-specific usage detail
      - GraphRAG-side Jina embedding is recorded through the GraphRAG adapter
        unless the GraphRAG runtime exposes provider-specific usage detail

  - name: provider_request_fingerprint
    schema: src/contracts/provider.ts#ProviderRequestFingerprintSchema
    envelope: src/contracts/provider.ts#ProviderRequestFingerprintEnvelopeSchema
    contract_level: required
    producers:
      - src/llm.ts#LlamaCpp.recordProviderCost
      - src/integrations/graphrag.ts#writeGraphRagProviderRequestArtifact
    consumers:
      - src/integrations/graphrag.ts#recordGraphRagCost
      - src/llm.ts#LlamaCpp.recordProviderCost
    storage: graph_vault/catalog/provider-requests/<artifact_id>.json
    notes:
      - stores redacted provider request fingerprints for cost lineage
      - providerFingerprint in high-cost book state is the redacted provider
        request boundary fingerprint used by artifact dedupe and resume checks
      - excludes secret values and raw provider request or response bodies

  - name: vault_restore_request
    schema: src/contracts/vault.ts#VaultRestoreRequestSchema
    envelope: src/contracts/vault.ts#VaultRestoreRequestEnvelopeSchema
    contract_level: required
    producers:
      - src/vault/restore.ts#restoreFromVault
      - test/integrations/contracts.test.ts#Data bus contracts
    consumers:
      - src/vault/restore.ts#restoreFromVault
    storage: transient
    notes:
      - restore request envelopes define the portable graph_vault restore
        boundary

  - name: vault_restore_report
    schema: src/contracts/vault.ts#VaultRestoreReportSchema
    envelope: src/contracts/vault.ts#VaultRestoreReportEnvelopeSchema
    contract_level: required
    producers:
      - src/vault/restore.ts#restoreFromVault
    consumers:
      - src/vault/restore.ts#restoreFromVault
    storage: graph_vault/catalog/restore-audits.jsonl
    notes:
      - portable is true only when documentsPortable and capabilitiesPortable
        are both true
      - capabilitiesPortable requires book catalog, checkpoints, artifacts, and
        validated capability source material for graph-enhanced identities

buses:
  - name: corpus_bus
    description: Typed ingestion bus for whole-corpus source and identity maps.
    payloads:
      - source_document
      - source_document_catalog
      - document_identity_map
      - graph_text_unit_identity_map
      - document_identity_catalog

  - name: qmd_retrieval_bus
    description: Typed whole-corpus lexical, vector, expansion, and rerank bus.
    payloads:
      - qmd_query_request
      - qmd_retrieval_candidate
      - qmd_search_result
      - query_expansion_item
      - unified_query_request

  - name: graph_enhancement_bus
    description: Typed graph-enhanced subset ingestion, state, and query bus.
    payloads:
      - graph_enhancement_request
      - graph_enhancement_state
      - graph_capability
      - graph_capability_catalog
      - graphrag_index_request
      - graphrag_index_response
      - graphrag_query_request
      - graphrag_query_response
      - graphrag_provider_detail
      - graphrag_evidence

  - name: unified_answer_bus
    description: Typed user-facing route, evidence, and answer bus.
    payloads:
      - unified_query_request
      - query_route_decision
      - candidate_route_decision
      - evidence_ref
      - unified_answer
      - graph_capability_error
      - typed_query_error

  - name: provider_bus
    description: Typed provider bus for OpenAI Responses API and Jina services.
    payloads:
      - openai_responses_provider_config
      - openai_responses_request
      - openai_responses_response
      - openai_responses_stream_event
      - openai_structured_output_schema
      - jina_embedding_request
      - jina_provider_config
      - jina_embedding_response
      - jina_rerank_request
      - jina_rerank_response
      - provider_request_fingerprint

  - name: offline_prompt_optimization_bus
    description: Typed DSPy query prompt optimization bus.
    payloads:
      - dspy_query_prompt_optimization_request
      - optimized_query_prompt_artifact
      - dspy_generated_expansion_record

  - name: book_processing_state_bus
    description: Typed persistence bus for per-book state, checkpoints, and artifacts.
    payloads:
      - book_job
      - book_job_catalog
      - book_stage_checkpoint
      - book_stage_checkpoint_list
      - book_artifact_manifest
      - book_artifact_manifest_list
      - book_resume_plan
      - book_run_catalog
      - book_run_record
      - provider_cost_accounting

  - name: vault_portability_bus
    description: Typed restore bus for reconstructing qmd indexes from graph_vault.
    payloads:
      - vault_restore_request
      - vault_restore_report

dependencies:
  - name: qmd
    purpose: local lexical, vector, and rerank retrieval backbone
    rationale: existing TypeScript retrieval core and CLI/MCP surface
    boundary: whole-corpus retrieval core and project-local index
    alternatives:
      - bespoke TypeScript retrieval stack
    controls:
      - project_config_priority
      - typed_route_service_shared_by_cli_and_mcp
    exit_conditions:
      - if retrieval core is fully replaced by a new typed engine

  - name: GraphRAG
    purpose: graph extraction, community reports, local/global/drift query engine
    rationale: qmd does not contain graph-native indexing or graph query orchestration
    alternatives:
      - custom knowledge graph pipeline
      - another graph retrieval framework
    boundary: python sidecar bridge
    preferred_vector_store: LanceDB
    controls:
      - version_pin
      - adapter_layer_only
      - no_business_route_logic_in_vendor
      - upgrade_smoke_test
      - lancedb_canonical_hash_excludes_vendor_versions
    exit_conditions:
      - if equivalent graph indexing and query quality exists natively in TypeScript

  - name: DSPy
    purpose: prompt compilation and query expansion optimization
    rationale: optimize prompts offline instead of embedding prompt search in online runtime
    alternatives:
      - manual prompt tuning
      - custom evolutionary prompt optimizer
    boundary: offline optimizer bridge
    controls:
      - typed_training_records
      - prompt_artifact_promotion
      - query_expansion_evaluation
    exit_conditions:
      - if query expansion prompt optimization is replaced by another typed optimizer

  - name: Jina
    purpose: embedding provider and rerank provider
    rationale: external high-quality embedding and rerank service
    alternatives:
      - OpenAI embeddings
      - Azure OpenAI embeddings
      - local embedding models
    boundary: >-
      GraphRAG embedding -> graphrag-llm -> LiteLLM; qmd embedding and rerank
      -> src/llm.ts Jina adapters -> Jina API
    required_env:
      - JINA_API_KEY
    controls:
      - typed_embedding_payloads
      - typed_rerank_payloads
      - provider_cost_accounting
    exit_conditions:
      - if embedding quality, latency, or cost no longer fit the retrieval pipeline
