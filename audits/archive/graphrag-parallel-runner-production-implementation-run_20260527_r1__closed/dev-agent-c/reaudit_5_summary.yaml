residual_risks:
  - >
    Terminal completion has a finalization fence, but the implementation still
    lacks a single explicit book-checkpoint to item-checkpoint to event to
    manifest critical section.
  - >
    qmd index locking exists in both runner script and GraphRAG book-state code;
    future qmd commands can bypass it unless the lock is centralized.
  - >
    status-json projection needs an explicit source-of-truth policy for fields
    derived from checkpoint, event log, provider lease, and subprocess registry.
