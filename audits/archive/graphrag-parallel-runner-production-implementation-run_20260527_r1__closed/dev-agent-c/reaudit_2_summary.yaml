blocking_findings_count: 8
residual_risks:
  - >
    Repository book-state fencing is improved, but event, manifest, qmd build
    manifest, producer manifest, and qmd index write paths still need the same
    current generation/token enforcement.
  - >
    Provider slot capacity is now durable-gated, but provider slot identity is
    not verified inside child/provider adapters and is not recorded fully in
    subprocess registry records.
  - >
    qmd writer command lock evidence does not prove all SQLite write paths are
    locked, especially createStore initialization and query/rerank cache writes.
  - >
    Existing fail-fast tests show a single recoverable checkpoint path, not
    multi-worker sibling cancellation, quiesce, and lease cleanup.
evidence_commands:
  static_review:
    - sed -n '1,220p' audits/graphrag-parallel-runner-production-implementation-run_20260527_r1__open/dev-agent-c/criteria.md
    - rg -n "coordinatorLock|providerSlot|qmdIndex|recoverEventLogTail|spawnCommand|failFast" scripts/graphrag/batch-epub-workflow.mjs
    - rg -n "assertBatchBookLease|writeYamlFile|recordArtifacts|appendRunRecord" src/job-state/repository.ts src/job-state/graphrag-book.ts
    - rg -n "withQmdIndexFileLock|QMD_GRAPHRAG_PROVIDER_SLOT|python-bridge|createStore|setCachedResult" src scripts test
    - rg -n "rejects coordinator takeover|durable provider slots|qmd writer commands acquire|migrate-only normalizes|rejects stage checkpoint" test
  controller_reported_passed:
    - node --check scripts/graphrag/batch-epub-workflow.mjs
    - npm run test:types -- --pretty false
    - rejects a second live coordinator
    - rejects coordinator takeover when expired lock pid is still alive
    - recovers stale provider slot leases
    - durable provider slots gate capacity
    - book-concurrency 2 runs multiple books through the worker pool
    - book-concurrency 1 preserves sequential book execution
    - migrate-only recovers a partial event log tail
    - migrate-only normalizes duplicate event ids
    - rejects stage checkpoint writes with stale batch book lease fencing
    - rejects artifact and run catalog writes with stale batch book lease fencing
    - accepts batch execution bus envelopes
    - qmd writer commands acquire the qmd index file lock
overall_notes: >
  Reaudit 2 confirms meaningful fixes since reaudit 1, but the implementation
  still fails the fixed production baseline because the remaining invariants are
  cross-boundary: fencing must cover every durable write, provider/qmd/subprocess
  controls must be enforced inside child and SQLite layers, and crash/race tests
  must prove recovery semantics rather than only wrapper events.
