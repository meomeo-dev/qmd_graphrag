blocking_findings:
  - id: RA4-B1
    criteria: [5, 9]
    title: durable checksum/reconcile is not applied to all book-state and
      GraphRAG sidecar read paths
    locations:
      - src/job-state/repository.ts:1844
      - src/job-state/graphrag-book.ts:915
      - src/job-state/artifact-validation.ts:177
      - test/graphrag-book-state.test.ts:3041
    why_blocking: >
      Generic repository YAML and GraphRAG JSON durable helpers now write
      checksum files and quarantine corrupt targets, but getBookJob still reads
      book-state YAML directly, graph text-unit identity sidecar fallback reads
      JSON directly, and qmd row-count sidecar validation accepts JSON directly.
      These paths bypass checksum verification, temp reconciliation, missing
      checksum backfill, and invalid/checksum-mismatch quarantine. The closed
      loop can therefore ignore or accept stale/corrupt sidecar or book-state
      evidence.
    required_fix: >
      Route all book-state YAML and GraphRAG sidecar JSON reads through durable
      reconcile helpers. Add checksum mismatch, invalid target quarantine,
      missing checksum backfill, and status-json boundary tests for book job
      YAML, qmd_graph_text_unit_identity.json, and qmd_row_count.json.
  - id: RA4-B2
    criteria: [10]
    title: mandatory production concurrency and recovery test coverage remains
      incomplete
    locations:
      - test/cli.test.ts:2141
      - test/cli.test.ts:2446
      - test/cli.test.ts:2516
      - test/cli.test.ts:2724
      - test/cli.test.ts:13023
      - scripts/graphrag/batch-epub-workflow.mjs:2880
      - scripts/graphrag/batch-epub-workflow.mjs:3360
      - scripts/graphrag/batch-epub-workflow.mjs:4007
      - scripts/graphrag/batch-epub-workflow.mjs:8131
      - scripts/graphrag/batch-epub-workflow.mjs:8180
      - scripts/graphrag/batch-epub-workflow.mjs:8632
      - scripts/graphrag/batch-epub-workflow.mjs:8688
    why_blocking: >
      Tests now cover parallel and sequential workers, coordinator live-lock
      rejection, provider slot recovery/capacity, qmd file lock, SQLite
      contention retry metrics, terminal finalization fence, event recovery and
      manifest rebuild. However criteria.md requires direct production coverage
      for duplicate book exclusion, stale claim fencing, coordinator recovery,
      and fail-fast/transient/provider wait durable evidence. Missing direct
      cases remain for duplicate canonical book exclusion, stale item
      checkpoint/event negative rejection, same-host live orphan subprocess
      termination, parallel non-transient quiesce with sibling subprocess kill,
      and durable JSON/YAML sidecar recovery.
    required_fix: >
      Add focused behavior tests for duplicate same-book workers, stale item
      claim/event writes, same-host live orphan process group termination,
      parallel fail-fast/non-transient quiesce, and durable JSON/YAML sidecar
      recovery with temp, checksum backfill, checksum mismatch quarantine, and
      invalid JSON quarantine.
